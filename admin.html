<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIFABOY Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
    background:#0d1117;
    color:#fff;
    font-family: 'Poppins', sans-serif;
    margin:0;
}
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:#111827;
    border-bottom:1px solid #222;
}
.logo{
    font-size:26px;
    font-weight:700;
    color:#ffd700;
}
.btn-home {
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
    background: #232939;
    padding: 8px 15px;
    border-radius: 8px;
    margin-right: 10px;
}
.logout{
    background:#dc2626;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight: bold;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}
.card{
    background:#151922;
    border-radius:15px;
    padding:20px;
    margin-bottom:25px;
}
input,textarea,select{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:18px;
    border:none;
    border-radius:10px;
    background:#232939;
    color:#fff;
    font-size:15px;
    box-sizing: border-box;
}
button{
    border:none;
    border-radius:10px;
    cursor:pointer;
    padding:14px 20px;
    font-weight:700;
}
.publish{
    background:#ffd700;
    color:#000;
    width: 100%;
}
.post{
    background:#1b2230;
    padding:18px;
    border-radius:12px;
    margin-top:15px;
}
.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}
.edit{
    background:#2563eb;
    color:#fff;
}
.delete{
    background:#dc2626;
    color:#fff;
}

/* Edit Modal Styling */
.modal {
    display: none;
    position: fixed;
    z-index: 3000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #151922;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.modal-actions {
    display: flex;
    gap: 10px;
}
.btn-save { background: #3ecf8e; color: white; flex: 1; }
.btn-cancel { background: transparent; color: #ff6b6b; border: 2px solid #ff6b6b; flex: 1; }
</style>
</head>
<body>

<header>
<div class="logo">⚽ FIFABOY ADMIN</div>
<div>
    <a href="index.html" class="btn-home">← View Site</a>
    <button class="logout" id="logoutBtn">Logout</button>
</div>
</header>

<div class="container">
    <div class="card">
        <h2>Create Post</h2>
        <input id="title" placeholder="Title">
        
        <label style="font-size: 14px; color: #ffd700;">Category / Platform</label>
        <select id="platform">
            <option value="Penalty">Penalty</option>
            <option value="Red Card">Red Card</option>
            <option value="Handball">Handball</option>
            <option value="VAR">VAR</option>
            <option value="Community">Community</option>
        </select>

        <textarea id="description" rows="5" placeholder="Description"></textarea>
        <input id="url" placeholder="Evidence Video/Photo URL">
        
        <button class="publish" id="publishBtn">Publish Post</button>
    </div>

    <div class="card">
        <h2>All Posts</h2>
        <div id="posts">Loading posts...</div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 style="color: #ffd700; margin-top: 0;">📝 Edit Post</h2>
        <input type="hidden" id="editPostId">
        
        <label>Title</label>
        <input id="editTitle" placeholder="Title">
        
        <label>Category</label>
        <select id="editPlatform">
            <option value="Penalty">Penalty</option>
            <option value="Red Card">Red Card</option>
            <option value="Handball">Handball</option>
            <option value="VAR">VAR</option>
            <option value="Community">Community</option>
        </select>
        
        <label>Description</label>
        <textarea id="editDescription" rows="4" placeholder="Description"></textarea>
        
        <label>Evidence URL</label>
        <input id="editUrl" placeholder="URL">
        
        <div class="modal-actions">
            <button class="btn-save" onclick="updatePostChanges()">Save Updates</button>
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
// ১. সুpabase কানেকশন সরাসরি করা হলো
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let adminUser = null;
let ALL_ADMIN_POSTS = [];

// ২. কঠোর এডমিন সিকিউরিটি চেক
async function checkAdmin(){
    try {
        const {data:{user}} = await mySupabase.auth.getUser();

        if(!user){
            window.location.href="login.html";
            return;
        }

        const {data, error} = await mySupabase
            .from("profiles")
            .select("role")
            .eq("id",user.id)
            .maybeSingle();

        if(!data || data.role !== "admin"){
            alert("সতর্কতা: আপনি এডমিন নন!");
            window.location.href="index.html";
            return;
        }

        adminUser = user;
        loadPosts(); // এডমিন ভেরিফাইড হলে পোস্ট লোড হবে
    } catch(e) {
        console.error(e);
        window.location.href="index.html";
    }
}

// ৩. নতুন পোস্ট ক্রিয়েট করা
document.getElementById("publishBtn").onclick = async () => {
    if(!adminUser) return;

    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const url = document.getElementById("url").value.trim();
    const platform = document.getElementById("platform").value;
    const publishBtn = document.getElementById("publishBtn");

    if(!title || !description) {
        alert("টাইটেল এবং ডেসক্রিপশন লিখুন!");
        return;
    }

    try {
        publishBtn.innerText = "Publishing...";
        publishBtn.disabled = true;

        const { error } = await mySupabase
            .from("posts")
            .insert({
                user_id: adminUser.id,
                title: title,
                description: description,
                url: url || null,
                platform: platform
            });

        if(error) throw error;

        alert("পোস্ট সফলভাবে পাবলিশ হয়েছে!");
        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("url").value = "";
        
        loadPosts();
    } catch(e) {
        alert("Error: " + e.message);
    } finally {
        publishBtn.innerText = "Publish Post";
        publishBtn.disabled = false;
    }
};

// ৪. এডমিন প্যানেলে সব পোস্টের লিস্ট লোড করা
async function loadPosts(){
    const postsContainer = document.getElementById("posts");
    try {
        const { data, error } = await mySupabase
            .from("posts")
            .select("*")
            .order("created_at", { ascending: false });

        if(error) throw error;
        
        ALL_ADMIN_POSTS = data || [];
        postsContainer.innerHTML = "";

        if(ALL_ADMIN_POSTS.length === 0) {
            postsContainer.innerHTML = "<p style='color:#aaa;'>No posts found.</p>";
            return;
        }

        ALL_ADMIN_POSTS.forEach(post => {
            const div = document.createElement("div");
            div.className = "post";
            div.innerHTML = `
                <h3 style="margin:0; color:#ffd700;">${post.title}</h3>
                <p style="color:#ccc; margin: 10px 0;">${post.description || ""}</p>
                <span style="font-size:12px; background:#232939; padding:4px 8px; border-radius:4px;">${post.platform}</span>
                <div class="actions">
                    <button class="edit" onclick="openEditModal(${post.id})">Edit</button>
                    <button class="delete" onclick="deletePost(${post.id})">Delete</button>
                </div>
            `;
            postsContainer.appendChild(div);
        });
    } catch(e) {
        postsContainer.innerHTML = "<p style='color:red;'>Failed to load: " + e.message + "</p>";
    }
}

// ৫. পোস্ট ডিলিট করা
async function deletePost(id){
    if(!confirm("আপনি কি নিশ্চিতভাবে এই পোস্টটি ডিলিট করতে চান?")) return;

    try {
        const { error } = await mySupabase
            .from("posts")
            .delete()
            .eq("id", id);

        if(error) throw error;
        alert("পোস্ট ডিলিট করা হয়েছে!");
        loadPosts();
    } catch(e) {
        alert("Delete failed: " + e.message);
    }
}

// ৬. এডিট মোডাল ওপেন করা এবং ডাটা ফিল করা
function openEditModal(id) {
    const post = ALL_ADMIN_POSTS.find(p => p.id === id);
    if(!post) return;

    document.getElementById("editPostId").value = post.id;
    document.getElementById("editTitle").value = post.title;
    document.getElementById("editPlatform").value = post.platform || "Community";
    document.getElementById("editDescription").value = post.description || "";
    document.getElementById("editUrl").value = post.url || "";

    document.getElementById("editModal").style.display = "flex";
}

function closeEditModal() {
    document.getElementById("editModal").style.display = "none";
}

// ৭. এডিট করা ডাটা Supabase-এ সেভ করা
async function updatePostChanges() {
    const id = document.getElementById("editPostId").value;
    const title = document.getElementById("editTitle").value.trim();
    const platform = document.getElementById("editPlatform").value;
    const description = document.getElementById("editDescription").value.trim();
    const url = document.getElementById("editUrl").value.trim();

    if(!title || !description) {
        alert("টাইটেল ও ডেসক্রিপশন খালি রাখা যাবে না!");
        return;
    }

    try {
        const { error } = await mySupabase
            .from("posts")
            .update({
                title: title,
                platform: platform,
                description: description,
                url: url || null
            })
            .eq("id", id);

        if(error) throw error;

        alert("পোস্ট সফলভাবে আপডেট হয়েছে!");
        closeEditModal();
        loadPosts();
    } catch(e) {
        alert("Update failed: " + e.message);
    }
}

// লগআউট
document.getElementById("logoutBtn").onclick = async () => {
    await mySupabase.auth.signOut();
    window.location.href = "login.html";
};

// পেজ লোড হলে সিকিউরিটি রান করা
window.addEventListener("DOMContentLoaded", checkAdmin);
</script>

</body>
</html>
