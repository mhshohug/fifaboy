<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TRACKBOY | Chat</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * {
        box-sizing: border-box !important;
        margin: 0;
        padding: 0;
    }
    html, body { 
        background-color: #0b0b0c !important; 
        color: #f5f5f7 !important; 
        font-family: 'Poppins', sans-serif !important; 
        height: 100% !important;
        width: 100% !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
    }

    /* 💬 প্রফেশনাল মেসেঞ্জার হেডার */
    .chat-header {
        background: #161618 !important;
        padding: 0 16px !important;
        display: flex !important;
        align-items: center !important;
        border-bottom: 1px solid #232326 !important;
        flex-shrink: 0 !important;
        width: 100% !important;
        height: 60px !important;
        gap: 12px !important;
    }
    .btn-back {
        background: transparent !important;
        color: #3ecf8e !important;
        border: none !important;
        font-size: 24px !important;
        cursor: pointer !important;
        line-height: 1 !important;
        padding: 5px !important;
        display: flex !important;
        align-items: center !important;
    }
    .chat-header h3 {
        font-size: 16px !important;
        font-weight: 600 !important;
        color: #fff !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
    }

    /* 📩 মেসেজ স্ক্রোল জোন */
    .chat-messages-container {
        flex: 1 !important;
        overflow-y: auto !important;
        padding: 20px 16px !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 8px !important;
        background: #0b0b0c !important;
        width: 100% !important;
        -webkit-overflow-scrolling: touch !important;
    }

    /* 💬 আধুনিক মেসেজ বাবল */
    .msg-bubble {
        max-width: 75% !important;
        padding: 10px 16px !important;
        font-size: 14px !important;
        line-height: 1.5 !important;
        word-wrap: break-word !important;
        white-space: pre-wrap !important;
        border-radius: 18px !important;
    }
    /* আমার মেসেজ: ডান কোনায় মসৃণ সবুজ */
    .msg-sent {
        background: #3ecf8e !important;
        color: #000 !important;
        font-weight: 500 !important;
        align-self: flex-end !important;
        border-bottom-right-radius: 4px !important;
    }
    /* ওপাশ থেকে আসা মেসেজ: বাম কোনায় ডার্ক গ্রে */
    .msg-received {
        background: #232326 !important;
        color: #f5f5f7 !important;
        align-self: flex-start !important;
        border-bottom-left-radius: 4px !important;
    }

    /* 📌 প্রিমিয়াম বটম ইনপুট বার (মেসেঞ্জারের মতো গোল ক্যাপসুল) */
    .chat-input-area {
        background: #161618 !important;
        padding: 10px 16px !important;
        display: flex !important;
        gap: 10px !important;
        align-items: center !important;
        border-top: 1px solid #232326 !important;
        flex-shrink: 0 !important;
        width: 100% !important;
        padding-bottom: max(10px, env(safe-area-inset-bottom)) !important; /* আইফোন/নতুন মোবাইলের নিচের বারের সেফটি */
    }
    .chat-input {
        flex: 1 !important;
        background: #232326 !important;
        border: 1px solid transparent !important;
        color: white !important;
        padding: 10px 16px !important;
        border-radius: 20px !important; /* গোল ক্যাপসুল ভিউ */
        font-size: 14px !important;
        outline: none !important;
        font-family: inherit !important;
        transition: 0.2s !important;
    }
    .chat-input:focus {
        border-color: #3ecf8e !important;
        background: #1c1c1e !important;
    }
    .btn-send {
        background: transparent !important;
        color: #3ecf8e !important;
        border: none !important;
        padding: 5px 8px !important;
        font-weight: 700 !important;
        font-size: 15px !important;
        cursor: pointer !important;
        flex-shrink: 0 !important;
        transition: 0.1s !important;
    }
    .btn-send:active {
        transform: scale(0.95);
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="chat-header">
    <button class="btn-back" onclick="window.location.href='inbox.html'">←</button>
    <h3 id="chatPartnerName">Loading...</h3>
</div>

<div id="chatMessagesBox" class="chat-messages-container">
    <p style="text-align:center; color:#666; font-size:13px; margin-top:10px;">Securing end-to-end connection...</p>
</div>

<div class="chat-input-area">
    <input type="text" id="chatMessageInput" class="chat-input" placeholder="Aa" onkeydown="if(event.key==='Enter') sendLiveMessage()">
    <button class="btn-send" onclick="sendLiveMessage()">Send</button>
</div>

<script src="js/chatbox.js"></script>

<script>
    function resetHeight() {
        document.body.style.height = window.innerHeight + 'px';
    }
    window.addEventListener('resize', resetHeight);
    window.addEventListener('orientationchange', resetHeight);
    resetHeight();
</script>
</body>
</html>
