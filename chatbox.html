<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACKBOY | Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0b0b0c; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .chat-header { background: #161618; padding: 10px 16px; display: flex; align-items: center; height: 60px; border-bottom: 1px solid #232326; flex-shrink: 0; }
        .chat-header h3 { flex: 1; margin-left: 15px; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-call { background: none; border: none; color: #3ecf8e; font-size: 22px; cursor: pointer; }

        #chatMessagesBox { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .msg-sent { background: #3ecf8e; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-received { background: #232326; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }

        .chat-input-area { background: #161618; padding: 10px 15px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; border-top: 1px solid #232326; height: 65px; }
        .chat-input { flex: 1; height: 45px; padding: 0 15px; border-radius: 25px; background: #232326; border: none; color: #fff; outline: none; font-size: 15px; }
        .btn-send { background: #3ecf8e; color: #000; border: none; padding: 0 20px; height: 45px; border-radius: 25px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

        #call-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .call-status-text { font-size: 22px; margin-bottom: 50px; color: #fff; }
        .call-btn-container { display: flex; gap: 40px; }
        .btn-round { width: 80px; height: 80px; border-radius: 50%; border: none; color: #fff; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="call-ui">
    <div id="call-status" class="call-status-text">Calling...</div>
    <div class="call-btn-container">
        <button id="btn-accept" style="background: green; display: none;" class="btn-round">Accept</button>
        <button id="btn-reject" style="background: red;" class="btn-round">End</button>
    </div>
</div>

<div class="chat-header">
    <button onclick="window.history.back()" style="background:none; border:none; color:#3ecf8e; font-size:20px;">←</button>
    <h3 id="chatPartnerName">Loading...</h3>
    <button class="btn-call" onclick="initiateCall()">📞</button>
</div>

<div id="chatMessagesBox"></div>

<div class="chat-input-area">
    <input type="text" id="chatMessageInput" class="chat-input" placeholder="Aa">
    <button class="btn-send" onclick="sendLiveMessage()">Send</button>
</div>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const peer = new Peer();
let targetUserId, currentUserId, currentCall;

peer.on('open', (id) => {
    mySupabase.auth.getUser().then(({ data: { user } }) => {
        if (user) {
            mySupabase.from('profiles').update({ peer_id: id }).eq('id', user.id).then(() => console.log("Peer ID updated"));
        }
    });
});

async function initChat() {
    const urlParams = new URLSearchParams(window.location.search);
    targetUserId = urlParams.get('target');
    const { data: { user } } = await mySupabase.auth.getUser();
    currentUserId = user?.id;
    const { data: profile } = await mySupabase.from('profiles').select('username').eq('id', targetUserId).single();
    document.getElementById('chatPartnerName').innerText = profile?.username || "User";
    loadPrivateChatHistory();
    listenToPrivateMessages();
}

function loadPrivateChatHistory() {
    mySupabase.from('messages').select('*').or(`sender_id.eq.${currentUserId},and(sender_id.eq.${targetUserId},receiver_id.eq.${currentUserId})`).order('created_at', { ascending: true }).then(({data}) => {
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = "";
        data?.forEach(m => {
            const div = document.createElement('div');
            div.className = "msg-bubble " + (m.sender_id === currentUserId ? "msg-sent" : "msg-received");
            div.innerText = m.message_text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function sendLiveMessage() {
    const input = document.getElementById('chatMessageInput');
    if(!input.value.trim()) return;
    mySupabase.from('messages').insert({ message_text: input.value, sender_id: currentUserId, receiver_id: targetUserId }).then(() => {
        input.value = "";
    });
}

function listenToPrivateMessages() {
    mySupabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => { loadPrivateChatHistory(); }).subscribe();
}

function initiateCall() {
    mySupabase.from('profiles').select('peer_id').eq('id', targetUserId).single().then(({data}) => {
        if(data?.peer_id) {
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('call-status').innerText = "Calling...";
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall = peer.call(data.peer_id, stream);
                document.getElementById('call-status').innerText = "Ringing...";
                currentCall.on('stream', s => { playAudio(s); document.getElementById('call-status').innerText = "Talking..."; });
            });
        }
    });
}

peer.on('call', call => {
    currentCall = call;
    document.getElementById('call-ui').style.display = 'flex';
    document.getElementById('call-status').innerText = "Incoming Call...";
    document.getElementById('btn-accept').style.display = 'block';
    document.getElementById('btn-accept').onclick = () => {
        navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
            call.answer(stream);
            call.on('stream', s => { playAudio(s); document.getElementById('call-status').innerText = "Talking..."; });
            document.getElementById('btn-accept').style.display = 'none';
        });
    };
});

document.getElementById('btn-reject').onclick = () => {
    if(currentCall) currentCall.close();
    document.getElementById('call-ui').style.display = 'none';
    location.reload();
};

function playAudio(s) { let a = new Audio(); a.srcObject = s; a.play(); }

window.onload = initChat;
</script>
</body>
</html>
