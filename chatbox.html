<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 60px; background: #111; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .chat-name { flex: 1; margin-left: 15px; font-weight: bold; cursor: pointer; color: #3ecf8e; }
        
        #chatMessagesBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; word-wrap: break-word; }
        .sent { background: #3ecf8e; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #333; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .footer { height: 70px; background: #111; display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 1px solid #333; flex-shrink: 0; }
        #msgInput { flex: 1; height: 45px; border-radius: 20px; border: none; padding: 0 15px; background: #222; color: #fff; outline: none; }
        .send-btn { height: 45px; padding: 0 20px; border-radius: 20px; border: none; background: #3ecf8e; color: #000; font-weight: bold; cursor: pointer; }

        #call-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .call-status-text { font-size: 22px; margin-bottom: 40px; color: #fff; }
        .btn-call-action { width: 75px; height: 75px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; color: #fff; font-size: 16px; }
    </style>
</head>
<body>

<div id="call-ui">
    <div id="call-status" class="call-status-text">Calling...</div>
    <div style="display:flex; gap: 40px;">
        <button id="btn-accept" style="background:#28a745; display:none;" class="btn-call-action">Accept</button>
        <button id="btn-reject" style="background:#dc3545;" class="btn-call-action">End</button>
    </div>
</div>

<div class="header">
    <div onclick="history.back()" style="cursor:pointer; font-size: 22px; color: #3ecf8e;">←</div>
    <div class="chat-name" id="chatName" onclick="openProfile()">Loading...</div>
    <div onclick="initCall()" style="font-size: 22px; cursor: pointer; color: #3ecf8e;">📞</div>
</div>

<div id="chatMessagesBox"></div>

<div class="footer">
    <input type="text" id="msgInput" placeholder="Aa">
    <button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
    const sb = window.supabase.createClient("https://zqsjopjkhtofyepjneby.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU");
    const peer = new Peer();
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('target') || urlParams.get('id');
    let myId, currentCall, ringTone;

    function openProfile() {
        if (targetId) window.location.href = 'profile.html?id=' + targetId;
    }

    function playRingtone() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        return setInterval(() => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }, 1000);
    }

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        myId = user.id;

        // চেক: লিংকে কি নিজের আইডি চলে আসছে?
        if (targetId === myId) {
            alert("সতর্কতা: আগের পেজ থেকে ভুল আইডি (আপনার নিজের আইডি) লিংকে পাঠানো হয়েছে! দয়া করে আগের পেজের কোড ঠিক করুন।");
        }

        // কলিং আইডি ডাটাবেসে সেভ করা
        peer.on('open', async (id) => {
            await sb.from('profiles').update({ peer_id: id }).eq('id', myId);
        });

        const { data: p } = await sb.from('profiles').select('username').eq('id', targetId).single();
        if (p) document.getElementById('chatName').innerText = p.username;
        
        load(); 
        sb.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, load).subscribe();
    }

    function initCall() {
        if(!targetId || targetId === myId) {
            alert("সঠিক ইউজারের আইডি পাওয়া যায়নি, কল করা সম্ভব না।");
            return;
        }
        sb.from('profiles').select('peer_id').eq('id', targetId).single().then(({data}) => {
            if(data && data.peer_id) {
                document.getElementById('call-ui').style.display = 'flex';
                document.getElementById('call-status').innerText = "Ringing...";
                ringTone = playRingtone();
                
                navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                    currentCall = peer.call(data.peer_id, s);
                    currentCall.on('stream', st => { 
                        clearInterval(ringTone); 
                        playAudio(st);
                        document.getElementById('call-status').innerText = "Talking..."; 
                    });
                });
            } else {
                alert("ইউজার অফলাইনে আছে।");
            }
        });
    }

    peer.on('call', call => {
        currentCall = call;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('call-status').innerText = "Incoming Call...";
        document.getElementById('btn-accept').style.display = 'block';
        ringTone = playRingtone();
        
        document.getElementById('btn-accept').onclick = () => {
            clearInterval(ringTone);
            document.getElementById('btn-accept').style.display = 'none';
            navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                call.answer(s);
                call.on('stream', st => { 
                    playAudio(st);
                    document.getElementById('call-status').innerText = "Talking..."; 
                });
            });
        };
    });

    document.getElementById('btn-reject').onclick = () => {
        clearInterval(ringTone);
        if(currentCall) currentCall.close();
        const status = document.getElementById('call-status');
        status.innerText = "Call Ended";
        status.style.color = "#dc3545";
        setTimeout(() => { 
            document.getElementById('call-ui').style.display = 'none'; 
            status.style.color = "#fff"; 
            status.innerText = "Calling..."; 
        }, 2000);
    };

    function playAudio(stream) { let a = new Audio(); a.srcObject = stream; a.play(); }

    async function load() {
        const { data } = await sb.from('messages').select('*')
            .or(`and(sender_id.eq.${myId},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${myId})`)
            .order('created_at', { ascending: true });
        
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '';
        data?.forEach(m => {
            const d = document.createElement('div');
            d.className = 'msg ' + (m.sender_id === myId ? 'sent' : 'received');
            d.innerText = m.message_text;
            box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim() || targetId === myId) return;
        await sb.from('messages').insert({ sender_id: myId, receiver_id: targetId, message_text: inp.value });
        inp.value = '';
    }

    window.onload = init;
</script>
</body>
</html>
