<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACKBOY | Chat Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .chat-header { background: #1e1e1e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2d; color: #3ecf8e; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 14px; }
        .msg-sent { background: #3ecf8e; align-self: flex-end; }
        .msg-received { background: #1e1e1e; border: 1px solid #2d2d2d; align-self: flex-start; }
        .chat-input-area { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #2b2b2b; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; }
        button { background: #3ecf8e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-header"><span>💬 Global Chat</span><button onclick="window.location.href='profile.html'">Back</button></div>
    <div id="chatMessagesBox" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatMessageInput" placeholder="Type a message...">
        <button onclick="sendLiveMessage()">Send</button>
    </div>
    <!-- জেএস লিংক -->
    <script src="js/chatbox.js"></script>
</body>
</html>
