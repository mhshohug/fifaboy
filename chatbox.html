<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* লেআউট স্টাইল */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: #111; padding: 10px 15px; display: flex; align-items: center; height: 55px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .back-btn { color: #3ecf8e; cursor: pointer; font-size: 22px; }
        .chat-name { flex: 1; margin-left: 15px; font-weight: bold; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .call-icon { cursor: pointer; font-size: 22px; color: #3ecf8e; }

        #chatMessagesBox { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 15px; }
        .sent { background: #3ecf8e; color: #000; align-self: flex-end; }
        .received { background: #333; color: #fff; align-self: flex-start; }

        .footer { height: 60px; background: #111; display: flex; align-items: center; padding: 5px 10px; gap: 10px; border-top: 1px solid #333; }
        #msgInput { flex: 1; height: 40px; border-radius: 20px; border: none; background: #222; color: #fff; padding: 0 15px; }
        .send-btn { height: 40px; padding: 0 15px; border-radius: 20px; border: none; background: #3ecf8e; font-weight: bold; }

        /* কলিং স্ক্রিন */
        #call-ui { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .btn-call-action { width: 70px; height: 70px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="call-ui">
    <div id="call-status" style="margin-bottom: 30px; font-size: 20px;">Calling...</div>
    <div style="display:flex; gap: 40px;">
        <button id="btn-accept" style="background:green; display:none;" class="btn-call-action">Accept</button>
        <button id="btn-reject" style="background:red;" class="btn-call-action">End</button>
    </div>
</div>

<div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="chat-name" id="chatName" onclick="window.location.href='profile.html?id=' + targetId">Loading...</div>
    <div class="call-icon" onclick="initCall()">📞</div>
</div>

<div id="chatMessagesBox"></div>

<div class="footer">
    <input type="text" id="msgInput" placeholder="Aa">
    <button class="send-btn" onclick="send()">Send</button>
</div>

<script>
    const sb = window.supabase.createClient("https://zqsjopjkhtofyepjneby.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU");
    const peer = new Peer();
    const targetId = new URLSearchParams(window.location.search).get('target');
    let myId, currentCall, ringTone;

    // কল রিংটোন সাউন্ড
    function playRingtone() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        return setInterval(() => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }, 1000);
    }

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        myId = user.id;
        const { data: p } = await sb.from('profiles').select('username').eq('id', targetId).single();
        document.getElementById('chatName').innerText = p.username;
        load();
        sb.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, load).subscribe();
    }

    // কলিং লজিক
    function initCall() {
        sb.from('profiles').select('peer_id').eq('id', targetId).single().then(({data}) => {
            document.getElementById('call-ui').style.display = 'flex';
            ringTone = playRingtone();
            navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                currentCall = peer.call(data.peer_id, s);
                currentCall.on('stream', st => { clearInterval(ringTone); document.getElementById('call-status').innerText = "Talking..."; });
            });
        });
    }

    peer.on('call', call => {
        currentCall = call;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('btn-accept').style.display = 'block';
        ringTone = playRingtone();
        document.getElementById('btn-accept').onclick = () => {
            clearInterval(ringTone);
            navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                call.answer(s);
                call.on('stream', st => { document.getElementById('call-status').innerText = "Talking..."; });
            });
        };
    });

    document.getElementById('btn-reject').onclick = () => {
        clearInterval(ringTone);
        if(currentCall) currentCall.close();
        document.getElementById('call-ui').style.display = 'none';
    };

    async function load() {
        const { data } = await sb.from('messages').select('*')
            .or(`and(sender_id.eq.${myId},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${myId})`)
            .order('created_at', { ascending: true });
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '';
        data.forEach(m => {
            const d = document.createElement('div');
            d.className = 'msg ' + (m.sender_id === myId ? 'sent' : 'received');
            d.innerText = m.message_text;
            box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('msgInput');
        if(!inp.value) return;
        await sb.from('messages').insert({ sender_id: myId, receiver_id: targetId, message_text: inp.value });
        inp.value = '';
    }

    window.onload = init;
</script>
</body>
</html>
