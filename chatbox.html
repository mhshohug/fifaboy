<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TRACKBOY | Chat Room</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * {
        box-sizing: border-box !important;
    }
    html, body { 
        background-color: #121212 !important; 
        color: white !important; 
        font-family: 'Poppins', sans-serif !important; 
        margin: 0 !important; 
        padding: 0 !important; 
        height: 100vh !important;
        width: 100% !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
    }

    /* চ্যাট হেডার */
    .chat-header {
        background: #1e1e1e !important;
        padding: 15px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        border-bottom: 1px solid #2d2d2d !important;
        flex-shrink: 0 !important;
        width: 100% !important;
    }
    .chat-header h3 {
        margin: 0 !important;
        font-size: 16px !important;
        color: #3ecf8e !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        max-width: 70% !important;
    }
    .btn-back {
        background: #333 !important;
        color: #fff !important;
        border: 1px solid #444 !important;
        padding: 6px 14px !important;
        border-radius: 6px !important;
        font-size: 13px !important;
        cursor: pointer !important;
        font-weight: 500 !important;
    }

    /* মেসেজ ডিসপ্লে এরিয়া (স্ক্রোল হবে) */
    .chat-messages-container {
        flex: 1 !important;
        overflow-y: auto !important;
        padding: 15px !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 12px !important;
        background: #121212 !important;
        width: 100% !important;
    }

    /* মেসেজ বাবল স্টাইল */
    .msg-bubble {
        max-width: 75% !important;
        padding: 10px 14px !important;
        border-radius: 16px !important;
        font-size: 14px !important;
        line-height: 1.4 !important;
        word-wrap: break-word !important;
        white-space: pre-wrap !important;
    }
    /* আমার পাঠানো মেসেজ (ডানে থাকবে) */
    .msg-sent {
        background: #3ecf8e !important;
        color: white !important;
        align-self: flex-end !important;
        border-bottom-right-radius: 4px !important;
    }
    /* ওপাশ থেকে আসা মেসেজ (বামে থাকবে) */
    .msg-received {
        background: #2a2a2a !important;
        color: #eee !important;
        align-self: flex-start !important;
        border-bottom-left-radius: 4px !important;
        border: 1px solid #333 !important;
    }

    /* নিচের ইনপুট ও সেন্ড বাটন এরিয়া (ফিক্সড থাকবে) */
    .chat-input-area {
        background: #1e1e1e !important;
        padding: 12px !important;
        display: flex !important;
        gap: 10px !important;
        align-items: center !important;
        border-top: 1px solid #2d2d2d !important;
        flex-shrink: 0 !important;
        width: 100% !important;
    }
    .chat-input {
        flex: 1 !important;
        background: #2a2a2a !important;
        border: 1px solid #444 !important;
        color: white !important;
        padding: 12px !important;
        border-radius: 8px !important;
        font-size: 14px !important;
        outline: none !important;
        font-family: inherit !important;
    }
    .chat-input:focus {
        border-color: #3ecf8e !important;
    }
    .btn-send {
        background: #3ecf8e !important;
        color: white !important;
        border: none !important;
        padding: 12px 20px !important;
        border-radius: 8px !important;
        font-weight: bold !important;
        font-size: 14px !important;
        cursor: pointer !important;
        flex-shrink: 0 !important;
    }
    .btn-send:active {
        background: #2aa872 !important;
    }
</style>
</head>
<body>

<div class="chat-header">
    <h3 id="chatPartnerName">💬 Loading Chat...</h3>
    <button class="btn-back" onclick="window.location.href='inbox.html'">Back</button>
</div>

<div id="chatMessagesBox" class="chat-messages-container">
    <p style="text-align:center; color:#666; margin-top:20px; font-size:14px;">Connecting securely...</p>
</div>

<div class="chat-input-area">
    <input type="text" id="chatMessageInput" class="chat-input" placeholder="Type a private message..." onkeydown="if(event.key==='Enter') sendLiveMessage()">
    <button class="btn-send" onclick="sendLiveMessage()">Send</button>
</div>

<script src="js/chatbox.js"></script>
</body>
</html>
