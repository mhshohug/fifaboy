<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACKBOY · Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b0b0c;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }
        .chat-header {
            background: #161618;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            height: 60px;
            border-bottom: 1px solid #2a2a2e;
            flex-shrink: 0;
        }
        .chat-header h3 {
            flex: 1;
            margin-left: 14px;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .btn-call {
            background: none;
            border: none;
            color: #3ecf8e;
            font-size: 24px;
            cursor: pointer;
            padding: 6px 12px;
            transition: 0.2s;
        }
        .btn-call:active {
            opacity: 0.6;
        }
        #chatMessagesBox {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .msg-bubble {
            max-width: 80%;
            padding: 11px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.45;
            word-break: break-word;
            animation: fadeIn 0.15s ease;
        }
        .msg-sent {
            background: #3ecf8e;
            color: #0b0b0c;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .msg-received {
            background: #232326;
            color: #f0f0f0;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0.5;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .chat-input-area {
            background: #161618;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            border-top: 1px solid #2a2a2e;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            background: #232326;
            border: none;
            color: #fff;
            outline: none;
            font-size: 15px;
            transition: 0.15s;
        }
        .chat-input::placeholder {
            color: #7a7a80;
        }
        .btn-send {
            background: #3ecf8e;
            color: #0b0b0c;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .btn-send:active {
            transform: scale(0.94);
            opacity: 0.8;
        }
        #call-ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(6px);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.2s;
        }
        #call-status {
            font-size: 26px;
            font-weight: 500;
            margin-bottom: 48px;
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 32px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .call-actions {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-action {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }
        .btn-action:active {
            transform: scale(0.92);
        }
        #btn-accept {
            background: #2b8c5e;
            display: none;
            box-shadow: 0 0 0 2px #3ecf8e;
        }
        #btn-reject {
            background: #c73b3b;
        }
        #btn-reject:active {
            background: #a02e2e;
        }
        .back-btn {
            background: none;
            border: none;
            color: #3ecf8e;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 6px;
        }
        .back-btn:active {
            opacity: 0.5;
        }
        /* রিংিং অ্যানিমেশন */
        @keyframes ringingPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .ringing {
            animation: ringingPulse 0.8s infinite;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <!-- CALL OVERLAY -->
    <div id="call-ui">
        <div id="call-status">📞 Calling...</div>
        <div class="call-actions">
            <button id="btn-accept" class="btn-action">✅ Accept</button>
            <button id="btn-reject" class="btn-action">⛔ End</button>
        </div>
    </div>

    <!-- CHAT HEADER -->
    <div class="chat-header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <h3 id="chatPartnerName">Loading...</h3>
        <button class="btn-call" onclick="initiateCall()">📞</button>
    </div>

    <!-- MESSAGES -->
    <div id="chatMessagesBox"></div>

    <!-- INPUT -->
    <div class="chat-input-area">
        <input type="text" id="chatMessageInput" class="chat-input" placeholder="Aa" autofocus>
        <button class="btn-send" onclick="sendLiveMessage()">Send</button>
    </div>

    <script>
        // ========== CONFIG ==========
        const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const peer = new Peer();

        // ----- state -----
        let currentUserId = null;
        let targetUserId = null;
        let currentCall = null;
        let localStream = null;
        let ringingInterval = null; // রিংিং সাউন্ডের জন্য

        // DOM refs
        const messagesBox = document.getElementById('chatMessagesBox');
        const inputMsg = document.getElementById('chatMessageInput');
        const partnerNameEl = document.getElementById('chatPartnerName');
        const callUI = document.getElementById('call-ui');
        const callStatus = document.getElementById('call-status');
        const btnAccept = document.getElementById('btn-accept');
        const btnReject = document.getElementById('btn-reject');

        // ========== রিংিং সাউন্ড জেনারেট ==========
        function startRingingSound() {
            if (ringingInterval) return;
            
            // Web Audio API ব্যবহার করে সিম্পল রিংিং সাউন্ড তৈরি
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            function playBeep() {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = 440; // A4 নোট
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
            
            // প্রতি 1.2 সেকেন্ডে বিপ শব্দ
            ringingInterval = setInterval(() => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                playBeep();
            }, 1200);
            
            // ক্লাস যোগ করুন (ভিজুয়াল ইফেক্ট)
            callStatus.classList.add('ringing');
        }

        function stopRingingSound() {
            if (ringingInterval) {
                clearInterval(ringingInterval);
                ringingInterval = null;
            }
            callStatus.classList.remove('ringing');
        }

        // ========== HELPERS ==========
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // ========== RENDER MESSAGES ==========
        function renderMessages(messages) {
            messagesBox.innerHTML = '';
            if (!messages || messages.length === 0) {
                const empty = document.createElement('div');
                empty.style.textAlign = 'center';
                empty.style.color = '#5a5a60';
                empty.style.fontSize = '14px';
                empty.style.margin = '30px 0';
                empty.innerText = 'No messages yet. Say hello!';
                messagesBox.appendChild(empty);
                return;
            }
            messages.forEach(msg => {
                const div = document.createElement('div');
                const isSent = msg.sender_id === currentUserId;
                div.className = `msg-bubble ${isSent ? 'msg-sent' : 'msg-received'}`;
                div.innerText = msg.message_text || '';
                messagesBox.appendChild(div);
            });
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        // ========== LOAD CHAT HISTORY ==========
        async function loadPrivateChatHistory() {
            if (!currentUserId || !targetUserId) return;

            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .or(`sender_id.eq.${currentUserId},and(sender_id.eq.${targetUserId},receiver_id.eq.${currentUserId})`)
                .order('created_at', { ascending: true });

            if (error) {
                console.warn('Error loading messages:', error);
                return;
            }
            renderMessages(data);
        }

        // ========== SEND MESSAGE ==========
        async function sendLiveMessage() {
            const text = inputMsg.value.trim();
            if (!text || !currentUserId || !targetUserId) return;

            const { error } = await supabase
                .from('messages')
                .insert({
                    message_text: text,
                    sender_id: currentUserId,
                    receiver_id: targetUserId,
                });

            if (error) {
                console.warn('Send error:', error);
                return;
            }
            inputMsg.value = '';
            loadPrivateChatHistory();
        }

        // ========== AUDIO PLAYBACK (call) ==========
        function playAudioStream(stream) {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.play().catch(e => console.warn('autoplay blocked', e));
        }

        // ========== INITIATE CALL (আউটগোয়িং) ==========
        async function initiateCall() {
            if (!targetUserId) return;

            const { data: profile, error } = await supabase
                .from('profiles')
                .select('peer_id')
                .eq('id', targetUserId)
                .single();

            if (error || !profile?.peer_id) {
                alert('User not available for call.');
                return;
            }

            // শো কল UI
            callUI.style.display = 'flex';
            callStatus.innerText = '📞 Calling...';
            btnAccept.style.display = 'none';
            
            // রিংিং সাউন্ড শুরু
            startRingingSound();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                localStream = stream;

                currentCall = peer.call(profile.peer_id, stream);
                
                currentCall.on('stream', remoteStream => {
                    stopRingingSound(); // রিংিং বন্ধ
                    playAudioStream(remoteStream);
                    callStatus.innerText = '🔊 Talking...';
                });
                
                currentCall.on('close', () => {
                    stopRingingSound();
                    callStatus.innerText = 'Call ended';
                    setTimeout(() => {
                        callUI.style.display = 'none';
                        if (localStream) {
                            localStream.getTracks().forEach(t => t.stop());
                            localStream = null;
                        }
                        currentCall = null;
                    }, 600);
                });
                
                currentCall.on('error', err => {
                    console.warn('call error', err);
                    stopRingingSound();
                    callStatus.innerText = '❌ Call failed';
                    setTimeout(() => {
                        callUI.style.display = 'none';
                        if (localStream) {
                            localStream.getTracks().forEach(t => t.stop());
                            localStream = null;
                        }
                        currentCall = null;
                    }, 1200);
                });
            } catch (e) {
                alert('Microphone access denied.');
                stopRingingSound();
                callUI.style.display = 'none';
                console.warn(e);
            }
        }

        // ========== INCOMING CALL ==========
        peer.on('call', incomingCall => {
            // শো ইনকামিং UI
            callUI.style.display = 'flex';
            callStatus.innerText = '📲 Incoming call...';
            btnAccept.style.display = 'flex';
            currentCall = incomingCall;
            
            // ইনকামিং কলেও রিংিং
            startRingingSound();

            btnAccept.onclick = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    localStream = stream;
                    incomingCall.answer(stream);
                    
                    stopRingingSound(); // রিংিং বন্ধ
                    
                    incomingCall.on('stream', remoteStream => {
                        playAudioStream(remoteStream);
                        callStatus.innerText = '🔊 Talking...';
                    });
                    incomingCall.on('close', () => {
                        stopRingingSound();
                        callStatus.innerText = 'Call ended';
                        setTimeout(() => {
                            callUI.style.display = 'none';
                            if (localStream) {
                                localStream.getTracks().forEach(t => t.stop());
                                localStream = null;
                            }
                            currentCall = null;
                        }, 600);
                    });
                    btnAccept.style.display = 'none';
                } catch (e) {
                    alert('Microphone access denied.');
                    stopRingingSound();
                    callUI.style.display = 'none';
                    console.warn(e);
                }
            };
        });

        // ========== REJECT / END CALL ==========
        btnReject.onclick = () => {
            stopRingingSound(); // রিংিং বন্ধ
            
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            callUI.style.display = 'none';
        };

        // ========== INIT CHAT ==========
        async function initChat() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                alert('Please log in first.');
                return;
            }
            currentUserId = user.id;

            const target = getUrlParam('target');
            if (!target) {
                alert('Missing chat target.');
                return;
            }
            targetUserId = target;

            const { data: profile } = await supabase
                .from('profiles')
                .select('username')
                .eq('id', targetUserId)
                .single();

            partnerNameEl.innerText = profile?.username || 'User';

            const { data: myProfile } = await supabase
                .from('profiles')
                .select('peer_id')
                .eq('id', currentUserId)
                .single();

            if (!myProfile?.peer_id) {
                await supabase
                    .from('profiles')
                    .update({ peer_id: peer.id })
                    .eq('id', currentUserId);
            } else {
                if (myProfile.peer_id !== peer.id) {
                    await supabase
                        .from('profiles')
                        .update({ peer_id: peer.id })
                        .eq('id', currentUserId);
                }
            }

            await loadPrivateChatHistory();

            supabase
                .channel('chat-realtime')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `receiver_id=eq.${currentUserId}`,
                }, (payload) => {
                    if (payload.new && payload.new.sender_id === targetUserId) {
                        loadPrivateChatHistory();
                    }
                })
                .subscribe();

            supabase
                .channel('my-messages')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `sender_id=eq.${currentUserId}`,
                }, (payload) => {
                    if (payload.new && payload.new.receiver_id === targetUserId) {
                        loadPrivateChatHistory();
                    }
                })
                .subscribe();

            inputMsg.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendLiveMessage();
                }
            });
        }

        // ========== START ==========
        let initialized = false;
        const originalInit = initChat;
        initChat = async function() {
            if (initialized) return;
            initialized = true;
            await originalInit();
        };

        peer.on('open', () => {
            console.log('PeerJS ready, id:', peer.id);
            initChat();
        });

        if (peer.open) {
            initChat();
        }

        // attach to global
        window.sendLiveMessage = sendLiveMessage;
        window.initiateCall = initiateCall;
    </script>
</body>
</html>
