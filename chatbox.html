<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TRACKBOY | Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    * { box-sizing: border-box !important; margin: 0; padding: 0; }
    html, body { background-color: #0b0b0c !important; color: #f5f5f7 !important; font-family: sans-serif !important; height: 100% !important; display: flex !important; flex-direction: column !important; }
    .chat-header { background: #161618 !important; padding: 10px 16px !important; display: flex !important; align-items: center !important; border-bottom: 1px solid #232326 !important; height: 60px !important; }
    .chat-messages-container { flex: 1 !important; overflow-y: auto !important; padding: 20px !important; }
    .chat-input-area { background: #161618 !important; padding: 10px !important; display: flex !important; gap: 10px !important; }
    .chat-input { flex: 1 !important; padding: 10px !important; border-radius: 20px !important; background: #232326 !important; border: none !important; color: white !important; }
</style>
</head>
<body>

<div class="chat-header">
    <button onclick="window.history.back()" style="background:none; border:none; color:#3ecf8e; font-size:20px;">←</button>
    <h3 id="chatPartnerName" style="margin-left:15px; flex:1;">Loading...</h3>
    <button onclick="initiateCall()" style="background:none; border:none; color:#3ecf8e; font-size:20px;">📞</button>
</div>

<div id="chatMessagesBox" class="chat-messages-container"></div>

<div class="chat-input-area">
    <input type="text" id="chatMessageInput" class="chat-input" placeholder="Aa">
    <button onclick="sendLiveMessage()" style="background:none; border:none; color:#3ecf8e;">Send</button>
</div>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let peer = new Peer();
let targetUserId, currentUserId;

async function initChat() {
    const urlParams = new URLSearchParams(window.location.search);
    targetUserId = urlParams.get('target');
    const { data: { user } } = await mySupabase.auth.getUser();
    if (!user) return;
    currentUserId = user.id;

    // ইউজার নাম লোড করা
    const { data: profile } = await mySupabase.from('profiles').select('username').eq('id', targetUserId).single();
    document.getElementById('chatPartnerName').innerText = profile ? profile.username : "User";
    
    loadPrivateChatHistory();
    listenToPrivateMessages();
}

async function loadPrivateChatHistory() {
    const { data } = await mySupabase.from('messages').select('*')
        .or(`sender_id.eq.${currentUserId},and(sender_id.eq.${targetUserId},receiver_id.eq.${currentUserId})`)
        .order('created_at', { ascending: true });
    
    const box = document.getElementById('chatMessagesBox');
    box.innerHTML = "";
    data?.forEach(m => {
        const div = document.createElement('div');
        div.style.margin = "10px 0";
        div.innerText = m.message_text;
        box.appendChild(div);
    });
}

function initiateCall() {
    mySupabase.from('profiles').select('peer_id').eq('id', targetUserId).single().then(({data}) => {
        if(data?.peer_id) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                let call = peer.call(data.peer_id, stream);
                alert("Calling...");
            });
        }
    });
}

async function sendLiveMessage() {
    const input = document.getElementById('chatMessageInput');
    await mySupabase.from('messages').insert({ message_text: input.value, sender_id: currentUserId, receiver_id: targetUserId });
    input.value = "";
    loadPrivateChatHistory();
}

function listenToPrivateMessages() {
    mySupabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
        loadPrivateChatHistory();
    }).subscribe();
}

window.onload = initChat;
</script>
</body>
</html>
