<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TRACKBOY | Chat</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * {
        box-sizing: border-box !important;
        margin: 0;
        padding: 0;
    }
    html, body { 
        background-color: #0b0b0c !important; 
        color: #f5f5f7 !important; 
        font-family: 'Poppins', sans-serif !important; 
        height: 100% !important;
        width: 100% !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
    }

    /* 💬 প্রফেশনাল মেসেঞ্জার হেডার */
    .chat-header {
        background: #161618 !important;
        padding: 0 16px !important;
        display: flex !important;
        align-items: center !important;
        border-bottom: 1px solid #232326 !important;
        flex-shrink: 0 !important;
        width: 100% !important;
        height: 60px !important;
        gap: 12px !important;
    }
    .btn-back {
        background: transparent !important;
        color: #3ecf8e !important;
        border: none !important;
        font-size: 24px !important;
        cursor: pointer !important;
        line-height: 1 !important;
        padding: 5px !important;
        display: flex !important;
        align-items: center !important;
    }
    .chat-header h3 {
        font-size: 16px !important;
        font-weight: 600 !important;
        color: #fff !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
    }

    /* 📩 মেসেজ স্ক্রোল জোন */
    .chat-messages-container {
        flex: 1 !important;
        overflow-y: auto !important;
        padding: 20px 16px !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 8px !important;
        background: #0b0b0c !important;
        width: 100% !important;
        -webkit-overflow-scrolling: touch !important;
    }

    /* 💬 আধুনিক মেসেজ বাবল */
    .msg-bubble {
        max-width: 75% !important;
        padding: 10px 16px !important;
        font-size: 14px !important;
        line-height: 1.5 !important;
        word-wrap: break-word !important;
        white-space: pre-wrap !important;
        border-radius: 18px !important;
    }
    .msg-sent {
        background: #3ecf8e !important;
        color: #000 !important;
        font-weight: 500 !important;
        align-self: flex-end !important;
        border-bottom-right-radius: 4px !important;
    }
    .msg-received {
        background: #232326 !important;
        color: #f5f5f7 !important;
        align-self: flex-start !important;
        border-bottom-left-radius: 4px !important;
    }

    /* 📌 প্রিমিয়াম বটম ইনপুট বার */
    .chat-input-area {
        background: #161618 !important;
        padding: 10px 16px !important;
        display: flex !important;
        gap: 10px !important;
        align-items: center !important;
        border-top: 1px solid #232326 !important;
        flex-shrink: 0 !important;
        width: 100% !important;
        padding-bottom: max(10px, env(safe-area-inset-bottom)) !important;
    }
    .chat-input {
        flex: 1 !important;
        background: #232326 !important;
        border: 1px solid transparent !important;
        color: white !important;
        padding: 10px 16px !important;
        border-radius: 20px !important;
        font-size: 14px !important;
        outline: none !important;
        font-family: inherit !important;
        transition: 0.2s !important;
    }
    .chat-input:focus {
        border-color: #3ecf8e !important;
        background: #1c1c1e !important;
    }
    .btn-send {
        background: transparent !important;
        color: #3ecf8e !important;
        border: none !important;
        padding: 5px 8px !important;
        font-weight: 700 !important;
        font-size: 15px !important;
        cursor: pointer !important;
        flex-shrink: 0 !important;
    }
</style>
</head>
<body>

<div class="chat-header">
    <button class="btn-back" onclick="window.location.href='inbox.html'">←</button>
    <div onclick="window.location.href='profile.html?uid=' + targetUserId" style="cursor:pointer; flex:1;">
        <h3 id="chatPartnerName">Loading...</h3>
    </div>
</div>

<div id="chatMessagesBox" class="chat-messages-container">
    <p style="text-align:center; color:#666; font-size:13px; margin-top:10px;">Securing end-to-end connection...</p>
</div>

<div class="chat-input-area">
    <input type="text" id="chatMessageInput" class="chat-input" placeholder="Aa" onkeydown="if(event.key==='Enter') sendLiveMessage()">
    <button class="btn-send" onclick="sendLiveMessage()">Send</button>
</div>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUserId = null; 
let targetUserId = null;  

async function initChat() {
    const urlParams = new URLSearchParams(window.location.search);
    targetUserId = urlParams.get('target');
    
    if (!targetUserId) {
        alert("কোনো ইউজার সিলেক্ট করা হয়নি ভাই!");
        window.history.back();
        return;
    }

    const { data: { user } } = await mySupabase.auth.getUser();
    if (!user) { window.location.href = "login.html"; return; }
    currentUserId = user.id;

    if (currentUserId === targetUserId) {
        document.getElementById('chatMessagesBox').innerHTML = "<p style='color:#aaa;text-align:center;padding:20px;'>এটি আপনার নিজের চ্যাট রুম ভাই!</p>";
        return;
    }

    // চ্যাট পার্টনারের নাম হেডার-এ দেখানো
    const { data: profile } = await mySupabase.from('profiles').select('username').eq('id', targetUserId).maybeSingle();
    if (profile && profile.username) {
        document.getElementById('chatPartnerName').innerText = "💬 " + profile.username;
    } else {
        document.getElementById('chatPartnerName').innerText = "💬 User_" + targetUserId.substring(0, 5);
    }

    await loadPrivateChatHistory();
    listenToPrivateMessages();
}

async function loadPrivateChatHistory() {
    const box = document.getElementById('chatMessagesBox');
    const { data, error } = await mySupabase
        .from('messages')
        .select('*')
        .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${targetUserId}),and(sender_id.eq.${targetUserId},receiver_id.eq.${currentUserId})`)
        .order('created_at', { ascending: true });
        
    if (error) { box.innerHTML = "<p style='color:red;text-align:center;'>Error loading chat</p>"; return; }
    
    box.innerHTML = data.length === 0 ? "<p class='no-msg-text' style='color:#666;text-align:center;margin-top:20px;'>No private messages yet.</p>" : "";
    data.forEach(m => appendMsgUI(m));
    box.scrollTop = box.scrollHeight;
}

function appendMsgUI(m) {
    const box = document.getElementById('chatMessagesBox');
    if (box.querySelector(`[data-msg-id="${m.id}"]`)) return;

    const noMsgText = box.querySelector('.no-msg-text');
    if(noMsgText) noMsgText.remove();

    const div = document.createElement('div');
    div.className = `msg-bubble ${m.sender_id === currentUserId ? 'msg-sent' : 'msg-received'}`;
    div.setAttribute("data-msg-id", m.id);
    div.innerText = m.message_text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

async function sendLiveMessage() {
    const input = document.getElementById('chatMessageInput');
    const text = input.value.trim();
    if (!text) return;
    
    input.value = '';
    
    const { error } = await mySupabase.from('messages').insert({ 
        message_text: text, 
        sender_id: currentUserId,
        receiver_id: targetUserId 
    });

    if(error) { alert("মেসেজ যায়নি ভাই!"); }
}

function listenToPrivateMessages() {
    mySupabase
        .channel('public:messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            const newMsg = payload.new;
            if ((newMsg.sender_id === currentUserId && newMsg.receiver_id === targetUserId) || 
                (newMsg.sender_id === targetUserId && newMsg.receiver_id === currentUserId)) {
                appendMsgUI(newMsg);
            }
        })
        .subscribe();
}

function resetHeight() {
    document.body.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resetHeight);
window.addEventListener('orientationchange', resetHeight);

window.onload = () => {
    resetHeight();
    initChat();
};
</script>
</body>
</html>
