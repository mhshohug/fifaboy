<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TRACKBOY | Chat</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    /* আগের সব স্টাইল ঠিক আছে, শুধু কলিং ইউআই যোগ করলাম */
    * { box-sizing: border-box !important; margin: 0; padding: 0; }
    html, body { background-color: #0b0b0c !important; color: #f5f5f7 !important; font-family: 'Poppins', sans-serif !important; height: 100% !important; width: 100% !important; overflow: hidden !important; display: flex !important; flex-direction: column !important; }
    .chat-header { background: #161618 !important; padding: 0 16px !important; display: flex !important; align-items: center !important; border-bottom: 1px solid #232326 !important; height: 60px !important; gap: 12px !important; }
    .btn-back { background: transparent !important; color: #3ecf8e !important; border: none !important; font-size: 24px !important; cursor: pointer !important; }
    .chat-header h3 { font-size: 16px !important; font-weight: 600 !important; color: #fff !important; }
    .btn-call { background: transparent !important; color: #3ecf8e !important; border: none !important; font-size: 20px !important; cursor: pointer !important; margin-left: auto !important; }
    
    /* কলিং পপআপ স্টাইল */
    #call-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; }
</style>
</head>
<body>

<div class="chat-header">
    <button class="btn-back" onclick="window.location.href='inbox.html'">←</button>
    <h3 id="chatPartnerName">Loading...</h3>
    <button class="btn-call" onclick="initiateCall()">📞</button>
</div>

<div id="call-popup">
    <h2 id="call-status">Calling...</h2>
    <button onclick="endCall()" style="margin-top:20px; padding:10px 20px; background:red; color:white; border:none; border-radius:10px;">End Call</button>
</div>

<div id="chatMessagesBox" class="chat-messages-container" style="flex:1; overflow-y:auto; padding:20px;"></div>

<div class="chat-input-area">
    <input type="text" id="chatMessageInput" class="chat-input" placeholder="Aa">
    <button class="btn-send" onclick="sendLiveMessage()">Send</button>
</div>

<script>
// রিংটোন সাউন্ড (আপনার ফোনের কোনো রিংটোন ইউআরএল এখানে দিতে পারেন)
const ringtone = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUserId = null; let targetUserId = null; let peer = new Peer(); let currentCall;

async function initChat() {
    const urlParams = new URLSearchParams(window.location.search);
    targetUserId = urlParams.get('target');
    const { data: { user } } = await mySupabase.auth.getUser();
    currentUserId = user.id;
    // ... (বাকি আগের লজিকগুলো এখানে থাকবে) ...
}

function initiateCall() {
    mySupabase.from('profiles').select('peer_id').eq('id', targetUserId).maybeSingle().then(({data}) => {
        if(data?.peer_id) {
            document.getElementById('call-popup').style.display = 'flex';
            document.getElementById('call-status').innerText = "Ringing...";
            ringtone.play();
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                currentCall = peer.call(data.peer_id, stream);
                currentCall.on('stream', stream => playAudio(stream));
            });
        }
    });
}

peer.on('call', call => {
    if(confirm("Incoming call! Accept?")) {
        call.answer();
        currentCall = call;
        document.getElementById('call-popup').style.display = 'flex';
        document.getElementById('call-status').innerText = "Connected";
        call.on('stream', stream => playAudio(stream));
    }
});

function playAudio(stream) {
    let audio = new Audio();
    audio.srcObject = stream;
    audio.play();
    ringtone.pause();
}

function endCall() {
    if(currentCall) currentCall.close();
    document.getElementById('call-popup').style.display = 'none';
    ringtone.pause();
    location.reload();
}

window.onload = () => { initChat(); };
// ... (বাকি আগের ফাংশনগুলো এখানে বসান) ...
</script>
</body>
</html>
