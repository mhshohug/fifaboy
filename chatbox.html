<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACKBOY | Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .chat-header { background: #1e1e1e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2d; color: #3ecf8e; font-weight: 600; }
        .back-btn { background: #2a2a2a; border: 1px solid #383838; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #121212; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 14px; word-break: break-word; }
        .msg-sent { background: #3ecf8e; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-received { background: #1e1e1e; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #2d2d2d; }
        .chat-input-area { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2d2d2d; }
        .chat-input { flex: 1; background: #2b2b2b; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; outline: none; }
        .chat-input:focus { border-color: #3ecf8e; }
        .send-btn { background: #3ecf8e; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-header">
        <span>💬 Loading Private Chat...</span>
        <button class="back-btn" onclick="window.history.back()">Back</button>
    </div>
    <div id="chatMessagesBox" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatMessageInput" class="chat-input" placeholder="Type a private message..." onkeydown="if(event.key === 'Enter') sendLiveMessage()">
        <button class="send-btn" onclick="sendLiveMessage()">Send</button>
    </div>
    
    <script src="js/chatbox.js"></script>
</body>
</html>
