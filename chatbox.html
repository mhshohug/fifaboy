<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* মোবাইল স্ক্রিনের জন্য ফিক্সড এবং রেসপন্সিভ লেআউট */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: Arial; }
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* হেডার */
        .header { height: 50px; background: #111; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; }
        .back-btn { font-size: 24px; color: #3ecf8e; cursor: pointer; }
        #chatName { flex: 1; margin-left: 15px; font-weight: bold; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* মেসেজ বক্স - এটি এখন পুরোপুরি স্ক্রলযোগ্য এবং ফুটারে ঢাকা পড়বে না */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 15px; }
        .sent { background: #3ecf8e; color: #000; align-self: flex-end; }
        .received { background: #333; color: #fff; align-self: flex-start; }

        /* ফুটার - ইনপুট বক্স সবসময় নিচে */
        .footer { height: 60px; background: #111; display: flex; align-items: center; padding: 5px 10px; gap: 10px; border-top: 1px solid #333; }
        #msgInput { flex: 1; height: 40px; border-radius: 20px; border: none; padding: 0 15px; background: #222; color: #fff; }
        .send-btn { height: 40px; padding: 0 20px; border-radius: 20px; border: none; background: #3ecf8e; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="back-btn" onclick="history.back()">←</div>
        <div id="chatName" onclick="window.location.href='profile.html?id=' + new URLSearchParams(window.location.search).get('target')">Loading...</div>
    </div>
    
    <div id="chatBox"></div>
    
    <div class="footer">
        <input type="text" id="msgInput" placeholder="Aa">
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://zqsjopjkhtofyepjneby.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU");
    const targetId = new URLSearchParams(window.location.search).get('target');
    let myId;

    async function start() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return;
        myId = user.id;
        const { data: p } = await sb.from('profiles').select('username').eq('id', targetId).single();
        document.getElementById('chatName').innerText = p.username;
        load();
        sb.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, load).subscribe();
    }

    async function load() {
        const { data } = await sb.from('messages').select('*')
            .or(`and(sender_id.eq.${myId},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${myId})`)
            .order('created_at', { ascending: true });
        const box = document.getElementById('chatBox');
        box.innerHTML = '';
        data.forEach(m => {
            const d = document.createElement('div');
            d.className = 'msg ' + (m.sender_id === myId ? 'sent' : 'received');
            d.innerText = m.message_text;
            box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('msgInput');
        if(!inp.value) return;
        await sb.from('messages').insert({ sender_id: myId, receiver_id: targetId, message_text: inp.value });
        inp.value = '';
    }

    window.onload = start;
</script>
</body>
</html>
