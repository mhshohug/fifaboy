<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>চ্যাট</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0b0b0c; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { position: absolute; top: 0; left: 0; width: 100%; background: #161618; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 65px; border-bottom: 1px solid #232326; z-index: 9999; }
        .chat-name { font-size: 18px; color: #3ecf8e; cursor: pointer; }
        .back-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 4px 6px; line-height: 1; }
        .call-btn { background: #3ecf8e; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .call-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #chatMessagesBox { flex: 1; overflow-y: auto; padding: 80px 16px 80px 16px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 15px; }
        .sent { background: #3ecf8e; color: #000; align-self: flex-end; }
        .received { background: #232326; color: #fff; align-self: flex-start; }
        .footer { position: absolute; bottom: 0; width: 100%; background: #161618; padding: 10px 15px; display: flex; gap: 10px; height: 70px; border-top: 1px solid #232326; }
        #msgInput { flex: 1; padding: 10px; border-radius: 30px; background: #232326; border: none; color: #fff; }
        .send-btn { background: #3ecf8e; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        #call-ui { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .btn-call-action { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="call-ui">
    <div id="call-status" style="margin-bottom: 20px; font-size: 20px;">📞 কলিং...</div>
    <div style="display:flex; gap:30px;">
        <button id="btn-accept" style="background:#28a745; display:none;" class="btn-call-action">✅ রিসিভ</button>
        <button id="btn-reject" style="background:#dc3545;" class="btn-call-action">⛔ কেটে দিন</button>
    </div>
    <button id="btn-speaker" onclick="toggleSpeaker()" style="margin-top:20px; background:#232326; color:#fff; border:1px solid #3ecf8e; padding:8px 18px; border-radius:30px; cursor:pointer; display:none;">🔊 স্পিকার</button>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px;">
        <button class="back-btn" onclick="goBack()" aria-label="ফিরে যান">←</button>
        <div class="chat-name" id="chatName" onclick="goToProfile()">লোড হচ্ছে...</div>
    </div>
    <button class="call-btn" id="callBtn" onclick="initCall()">📞 কল</button>
</div>

<div id="chatMessagesBox"></div>

<div class="footer">
    <input type="text" id="msgInput" placeholder="Aa">
    <button class="send-btn" onclick="sendMessage()">পাঠান</button>
</div>

<script>
    const sb = window.supabase.createClient("https://zqsjopjkhtofyepjneby.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU");
    const peer = new Peer(undefined, {
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                // TURN relay servers — needed when direct P2P fails, e.g. one
                // side is on mobile data or behind a restrictive/symmetric NAT.
                // (Public demo credentials; fine for testing, but for production
                // use your own TURN provider — these are rate-limited/shared.)
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        }
    });
    const targetId = new URLSearchParams(window.location.search).get('target');
    let myId = null;
    let currentCall = null;
    let localStream = null;

    // Single reusable audio element for remote stream playback (fixes the
    // original bug where a new, un-played Audio() was used for srcObject
    // and a second, empty Audio() was the one actually played).
    const remoteAudio = new Audio();
    remoteAudio.autoplay = true;

    // --- Ringback tone: plays on the CALLER's side while waiting for answer ---
    let ringbackCtx = null;
    let ringbackInterval = null;

    function startRingback() {
        if (ringbackInterval) return;
        ringbackCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPulse() {
            const now = ringbackCtx.currentTime;
            const osc = ringbackCtx.createOscillator();
            const gain = ringbackCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 425; // classic ring-back tone frequency
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gain.gain.linearRampToValueAtTime(0.2, now + 1.0);
            gain.gain.linearRampToValueAtTime(0, now + 1.05);
            osc.connect(gain);
            gain.connect(ringbackCtx.destination);
            osc.start(now);
            osc.stop(now + 1.1);
        }

        playPulse();
        ringbackInterval = setInterval(playPulse, 3000); // 1s tone, ~2s silence
    }

    function stopRingback() {
        if (ringbackInterval) {
            clearInterval(ringbackInterval);
            ringbackInterval = null;
        }
        if (ringbackCtx) {
            ringbackCtx.close();
            ringbackCtx = null;
        }
    }

    // --- Ringtone for incoming calls (synthesized, no external audio file needed) ---
    let ringtoneCtx = null;
    let ringtoneInterval = null;

    function startRingtone() {
        if (ringtoneInterval) return;
        ringtoneCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone() {
            const now = ringtoneCtx.currentTime;
            [0, 0.15].forEach((offset) => {
                const osc = ringtoneCtx.createOscillator();
                const gain = ringtoneCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 900;
                gain.gain.setValueAtTime(0, now + offset);
                gain.gain.linearRampToValueAtTime(0.25, now + offset + 0.02);
                gain.gain.linearRampToValueAtTime(0, now + offset + 0.12);
                osc.connect(gain);
                gain.connect(ringtoneCtx.destination);
                osc.start(now + offset);
                osc.stop(now + offset + 0.15);
            });
        }

        playTone();
        ringtoneInterval = setInterval(playTone, 2000);
    }

    function stopRingtone() {
        if (ringtoneInterval) {
            clearInterval(ringtoneInterval);
            ringtoneInterval = null;
        }
        if (ringtoneCtx) {
            ringtoneCtx.close();
            ringtoneCtx = null;
        }
    }

    let callTimeoutId = null;

    function clearCallTimeout() {
        if (callTimeoutId) {
            clearTimeout(callTimeoutId);
            callTimeoutId = null;
        }
    }

    // --- Speaker toggle (earpiece vs loudspeaker) ---
    // Not supported on all browsers (notably iOS Safari has no public API
    // for this at all). Where supported (mainly some Android Chrome
    // versions), we switch the output device the remote audio plays through.
    let usingSpeaker = true; // default is loudspeaker, as observed

    async function toggleSpeaker() {
        if (typeof remoteAudio.setSinkId !== 'function') {
            alert('আপনার ব্রাউজারে স্পিকার বদলানোর সুবিধা সমর্থিত নয়।');
            return;
        }
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const outputs = devices.filter(d => d.kind === 'audiooutput');
            const earpiece = outputs.find(d => /earpiece|receiver/i.test(d.label));
            const speaker = outputs.find(d => /speaker/i.test(d.label));

            if (usingSpeaker && earpiece) {
                await remoteAudio.setSinkId(earpiece.deviceId);
                usingSpeaker = false;
                document.getElementById('btn-speaker').textContent = '📱 ইয়ারপিস';
            } else if (!usingSpeaker && speaker) {
                await remoteAudio.setSinkId(speaker.deviceId);
                usingSpeaker = true;
                document.getElementById('btn-speaker').textContent = '🔊 স্পিকার';
            } else {
                alert('এই ডিভাইসে আলাদা আউটপুট খুঁজে পাওয়া যায়নি।');
            }
        } catch (err) {
            console.error('setSinkId failed:', err);
            alert('স্পিকার বদলানো যায়নি — এই ব্রাউজার/ডিভাইসে সমর্থিত নয়।');
        }
    }

    function goToProfile() {
        if (targetId) {
            window.location.href = 'profile.html?target=' + encodeURIComponent(targetId);
        }
    }

    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = 'index.html'; // fallback: adjust to your chat-list page
        }
    }

    async function init(peerId) {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        myId = user.id;

        // Save this session's PeerJS id against the logged-in user's profile.
        // (Must happen here, using the id passed in from the 'open' event,
        // not via a second peer.on('open', ...) registered after init() —
        // 'open' only fires once, so a listener added inside init() would
        // never run and peer_id would never reach the database.)
        if (peerId) {
            const { error } = await sb.from('profiles').update({ peer_id: peerId }).eq('id', myId);
            if (error) console.error('peer_id update failed:', error);
        }

        const { data: profile } = await sb.from('profiles').select('username').eq('id', targetId).single();
        document.getElementById('chatName').textContent = profile?.username || 'চ্যাট';
        loadMessages();
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*').or(`and(sender_id.eq.${myId},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${myId})`).order('created_at', { ascending: true });
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '';
        data?.forEach(msg => {
            const div = document.createElement('div');
            div.className = `msg ${msg.sender_id === myId ? 'sent' : 'received'}`;
            div.innerText = msg.message_text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const text = document.getElementById('msgInput').value.trim();
        if (!text) return;
        await sb.from('messages').insert({ sender_id: myId, receiver_id: targetId, message_text: text });
        document.getElementById('msgInput').value = '';
    }

    function showCallUI(isIncoming) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('btn-accept').style.display = isIncoming ? 'block' : 'none';
        document.getElementById('call-status').textContent = isIncoming ? '📞 ইনকামিং কল...' : '📞 কলিং...';
        document.getElementById('callBtn').disabled = true;
    }

    function resetCallUI() {
        document.getElementById('call-ui').style.display = 'none';
        document.getElementById('btn-accept').style.display = 'none';
        document.getElementById('btn-speaker').style.display = 'none';
        document.getElementById('btn-speaker').textContent = '🔊 স্পিকার';
        usingSpeaker = true;
        document.getElementById('callBtn').disabled = false;
        remoteAudio.srcObject = null;
        stopRingtone();
        stopRingback();
        clearCallTimeout();
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        currentCall = null;
    }

    function attachCallHandlers(call) {
        call.on('stream', (remoteStream) => {
            stopRingtone();
            stopRingback();
            clearCallTimeout();
            document.getElementById('call-status').textContent = '🔊 কথা হচ্ছে';
            remoteAudio.srcObject = remoteStream;
            remoteAudio.play().catch(() => {});
            document.getElementById('btn-speaker').style.display = 'inline-block';
        });
        call.on('close', resetCallUI);
        call.on('error', resetCallUI);

        // Debug aid: watch the underlying WebRTC connection state so you can
        // see in the console whether media actually connects (vs just the
        // PeerJS signaling succeeding).
        call.peerConnection?.addEventListener('iceconnectionstatechange', () => {
            console.log('ICE connection state:', call.peerConnection.iceConnectionState);
        });
    }

    async function initCall() {
        if (currentCall) return; // already in a call, ignore

        const { data: profile } = await sb.from('profiles').select('peer_id').eq('id', targetId).single();
        if (!profile?.peer_id) { alert('ইউজার অনলাইনে নেই!'); return; }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            showCallUI(false);
            document.getElementById('call-status').textContent = '📳 রিং হচ্ছে...';
            startRingback();

            currentCall = peer.call(profile.peer_id, stream, { metadata: { callerId: myId } });
            attachCallHandlers(currentCall);

            // If nobody answers within 25s, assume no response / offline.
            callTimeoutId = setTimeout(() => {
                if (currentCall) {
                    alert('কোনো রেসপন্স পাওয়া যায়নি — ইউজার হয়তো অফলাইনে আছে।');
                    currentCall.close();
                    resetCallUI();
                }
            }, 25000);
        } catch (err) {
            alert('মাইক্রোফোন অ্যাক্সেস করা যায়নি।');
            resetCallUI();
        }
    }

    peer.on('call', (call) => {
        if (currentCall) { call.close(); return; } // already busy, reject silently
        currentCall = call;
        showCallUI(true);
        startRingtone();

        // Let the caller know their call actually reached us and is ringing here.
        const callerId = call.metadata?.callerId;
        if (callerId) {
            const notifyCh = sb.channel('signal-' + callerId);
            notifyCh.subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    notifyCh.send({ type: 'broadcast', event: 'ringing', payload: {} });
                }
            });
        }

        document.getElementById('btn-accept').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream = stream;
                stopRingtone();
                call.answer(stream);
                attachCallHandlers(call);
                document.getElementById('btn-accept').style.display = 'none';
            } catch (err) {
                alert('মাইক্রোফোন অ্যাক্সেস করা যায়নি।');
                call.close();
                resetCallUI();
            }
        };
    });

    document.getElementById('btn-reject').onclick = () => {
        if (currentCall) currentCall.close();
        resetCallUI();
    };

    sb.channel('realtime-messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();

    peer.on('error', (err) => {
        console.error('PeerJS error:', err.type, err);
        // Fires quickly (within a few seconds) when the target's peer_id is
        // not currently connected to the signaling server — i.e. they're
        // genuinely offline. Much faster and more reliable than waiting
        // for the full no-answer timeout.
        if (err.type === 'peer-unavailable' && currentCall) {
            alert('ইউজার এখন অফলাইনে আছে — কল পৌঁছায়নি।');
            resetCallUI();
        }
    });

    peer.on('disconnected', () => {
        console.warn('PeerJS disconnected from signaling server. Attempting reconnect...');
        peer.reconnect();
    });

    peer.on('open', (id) => init(id));
</script>
</body>
</html>
