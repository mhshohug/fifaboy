<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>চ্যাট</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0b0b0c; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { position: absolute; top: 0; left: 0; width: 100%; background: #161618; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 65px; border-bottom: 1px solid #232326; z-index: 9999; }
        .chat-name { font-size: 18px; color: #3ecf8e; cursor: pointer; }
        .call-btn { background: #3ecf8e; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .call-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #chatMessagesBox { flex: 1; overflow-y: auto; padding: 80px 16px 80px 16px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 15px; }
        .sent { background: #3ecf8e; color: #000; align-self: flex-end; }
        .received { background: #232326; color: #fff; align-self: flex-start; }
        .footer { position: absolute; bottom: 0; width: 100%; background: #161618; padding: 10px 15px; display: flex; gap: 10px; height: 70px; border-top: 1px solid #232326; }
        #msgInput { flex: 1; padding: 10px; border-radius: 30px; background: #232326; border: none; color: #fff; }
        .send-btn { background: #3ecf8e; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        #call-ui { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .btn-call-action { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="call-ui">
    <div id="call-status" style="margin-bottom: 20px; font-size: 20px;">📞 কলিং...</div>
    <div style="display:flex; gap:30px;">
        <button id="btn-accept" style="background:#28a745; display:none;" class="btn-call-action">✅ রিসিভ</button>
        <button id="btn-reject" style="background:#dc3545;" class="btn-call-action">⛔ কেটে দিন</button>
    </div>
</div>

<div class="header">
    <div class="chat-name" id="chatName">লোড হচ্ছে...</div>
    <button class="call-btn" id="callBtn" onclick="initCall()">📞 কল</button>
</div>

<div id="chatMessagesBox"></div>

<div class="footer">
    <input type="text" id="msgInput" placeholder="Aa">
    <button class="send-btn" onclick="sendMessage()">পাঠান</button>
</div>

<script>
    const sb = window.supabase.createClient("https://zqsjopjkhtofyepjneby.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU");
    const peer = new Peer();
    const targetId = new URLSearchParams(window.location.search).get('target');
    let myId = null;
    let currentCall = null;
    let localStream = null;

    // Single reusable audio element for remote stream playback (fixes the
    // original bug where a new, un-played Audio() was used for srcObject
    // and a second, empty Audio() was the one actually played).
    const remoteAudio = new Audio();
    remoteAudio.autoplay = true;

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        myId = user.id;
        peer.on('open', (id) => sb.from('profiles').update({ peer_id: id }).eq('id', myId));

        const { data: profile } = await sb.from('profiles').select('username').eq('id', targetId).single();
        document.getElementById('chatName').textContent = profile?.username || 'চ্যাট';
        loadMessages();
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*').or(`and(sender_id.eq.${myId},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${myId})`).order('created_at', { ascending: true });
        const box = document.getElementById('chatMessagesBox');
        box.innerHTML = '';
        data?.forEach(msg => {
            const div = document.createElement('div');
            div.className = `msg ${msg.sender_id === myId ? 'sent' : 'received'}`;
            div.innerText = msg.message_text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const text = document.getElementById('msgInput').value.trim();
        if (!text) return;
        await sb.from('messages').insert({ sender_id: myId, receiver_id: targetId, message_text: text });
        document.getElementById('msgInput').value = '';
    }

    function showCallUI(isIncoming) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('btn-accept').style.display = isIncoming ? 'block' : 'none';
        document.getElementById('call-status').textContent = isIncoming ? '📞 ইনকামিং কল...' : '📞 কলিং...';
        document.getElementById('callBtn').disabled = true;
    }

    function resetCallUI() {
        document.getElementById('call-ui').style.display = 'none';
        document.getElementById('btn-accept').style.display = 'none';
        document.getElementById('callBtn').disabled = false;
        remoteAudio.srcObject = null;
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        currentCall = null;
    }

    function attachCallHandlers(call) {
        call.on('stream', (remoteStream) => {
            document.getElementById('call-status').textContent = '🔊 কথা বলা হচ্ছে';
            remoteAudio.srcObject = remoteStream;
            remoteAudio.play().catch(() => {});
        });
        call.on('close', resetCallUI);
        call.on('error', resetCallUI);
    }

    async function initCall() {
        if (currentCall) return; // already in a call, ignore

        const { data: profile } = await sb.from('profiles').select('peer_id').eq('id', targetId).single();
        if (!profile?.peer_id) { alert('ইউজার অনলাইনে নেই!'); return; }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            showCallUI(false);
            currentCall = peer.call(profile.peer_id, stream);
            attachCallHandlers(currentCall);
        } catch (err) {
            alert('মাইক্রোফোন অ্যাক্সেস করা যায়নি।');
            resetCallUI();
        }
    }

    peer.on('call', (call) => {
        if (currentCall) { call.close(); return; } // already busy, reject silently
        currentCall = call;
        showCallUI(true);

        document.getElementById('btn-accept').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream = stream;
                call.answer(stream);
                attachCallHandlers(call);
                document.getElementById('btn-accept').style.display = 'none';
            } catch (err) {
                alert('মাইক্রোফোন অ্যাক্সেস করা যায়নি।');
                call.close();
                resetCallUI();
            }
        };
    });

    document.getElementById('btn-reject').onclick = () => {
        if (currentCall) currentCall.close();
        resetCallUI();
    };

    sb.channel('realtime-messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();

    peer.on('open', () => init());
</script>
</body>
</html>
