<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRACKBOY | Inbox</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    html, body { background-color: #121212 !important; color: white !important; font-family: 'Poppins', sans-serif !important; margin: 0 !important; padding: 20px !important; }
    .inbox-container { max-width: 500px !important; margin: 0 auto !important; background: #1e1e1e !important; padding: 20px !important; border-radius: 12px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important; }
    .inbox-title { color: #3ecf8e !important; font-size: 22px !important; font-weight: bold !important; margin-bottom: 20px !important; border-bottom: 1px solid #333 !important; padding-bottom: 10px !important; }
    .chat-item { background: #2a2a2a !important; padding: 15px !important; border-radius: 8px !important; margin-bottom: 10px !important; display: flex !important; align-items: center !important; justify-content: space-between !important; cursor: pointer !important; border: 1px solid #383838 !important; transition: 0.2s !important; }
    .chat-item:hover { border-color: #3ecf8e !important; background: #333 !important; }
    /* NEW: unread chat gets a highlighted border + slightly different background */
    .chat-item.unread { border-color: #3ecf8e !important; background: #22332a !important; }
    .user-info { display: flex !important; align-items: center !important; gap: 8px !important; }
    .user-info h4 { margin: 0 !important; color: #fff !important; font-size: 16px !important; }
    /* NEW: bold name for unread chats */
    .chat-item.unread .user-info h4 { font-weight: 700 !important; color: #3ecf8e !important; }
    .user-info p { margin: 5px 0 0 0 !important; color: #aaa !important; font-size: 13px !important; }
    /* NEW: bolder, brighter preview text for unread chats */
    .chat-item.unread .user-info p { color: #ddd !important; font-weight: 600 !important; }
    .btn-chat { background: #3ecf8e !important; color: white !important; border: none !important; padding: 6px 12px !important; border-radius: 6px !important; font-weight: bold !important; font-size: 12px !important; }
    /* NEW: small green unread dot next to the name */
    .unread-dot { width: 9px !important; height: 9px !important; border-radius: 50% !important; background: #3ecf8e !important; display: inline-block !important; box-shadow: 0 0 6px rgba(62,207,142,0.8) !important; flex-shrink: 0 !important; }
    /* NEW: unread count badge under the timestamp */
    .unread-badge { background: #3ecf8e !important; color: #0b0b0c !important; font-size: 11px !important; font-weight: 700 !important; padding: 2px 7px !important; border-radius: 10px !important; display: inline-block !important; margin-bottom: 5px !important; }
</style>
</head>
<body>

<div class="inbox-container">
    <div class="inbox-title">📥 Recent Private Messages</div>
    <div id="inboxList">
        <p style="text-align:center; color:#888;">Loading your messages...</p>
    </div>
    <button class="btn" style="background:#444; color:white; width:100%; margin-top:15px; padding:10px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="window.location.href='index.html'">Back to Home</button>
</div>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let globalUser = null;

async function initInbox() {
    const { data: { user } } = await mySupabase.auth.getUser();
    if (!user) {
        document.getElementById("inboxList").innerHTML = '<p style="text-align:center; color:#ff4a4a;">দয়া করে প্রথমে লগইন করুন ভাই!</p>';
        return;
    }
    globalUser = user;
    await loadInboxData();
    listenToLiveInbox();
    updateInboxCount(); // সংখ্যা আপডেট করার কল
}

async function loadInboxData() {
    const listContainer = document.getElementById("inboxList");
    const { data: messages, error } = await mySupabase
        .from('messages')
        .select('*')
        .or(`sender_id.eq.${globalUser.id},receiver_id.eq.${globalUser.id}`)
        .order('created_at', { ascending: false });

    if (!messages || messages.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">No messages yet.</p>';
        return;
    }

    // NEW: track last message + per-partner unread count (messages this
    // partner sent to me that I haven't read yet) in the same pass.
    const chatPartners = {};
    messages.forEach(msg => {
        const partnerId = msg.sender_id === globalUser.id ? msg.receiver_id : msg.sender_id;
        if (!chatPartners[partnerId]) {
            chatPartners[partnerId] = {
                lastMessage: msg.message_text,
                time: new Date(msg.created_at).toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'}),
                unreadCount: 0
            };
        }
        // Only messages FROM the partner TO me that are still unread count here.
        if (msg.sender_id === partnerId && msg.receiver_id === globalUser.id && msg.read_status === false) {
            chatPartners[partnerId].unreadCount += 1;
        }
    });

    listContainer.innerHTML = "";
    for (const partnerId in chatPartners) {
        const { data: profile } = await mySupabase.from('profiles').select('username').eq('id', partnerId).maybeSingle();
        const name = (profile && profile.username) ? profile.username : "User_" + partnerId.substring(0, 5);
        const partner = chatPartners[partnerId];
        const isUnread = partner.unreadCount > 0;

        const item = document.createElement("div");
        item.className = "chat-item" + (isUnread ? " unread" : "");
        item.onclick = () => window.location.href = `chatbox.html?target=${partnerId}`;
        item.innerHTML = `
            <div class="user-info">
                ${isUnread ? '<span class="unread-dot"></span>' : ''}
                <div>
                    <h4>💬 ${name}</h4>
                    <p>${partner.lastMessage}</p>
                </div>
            </div>
            <div style="text-align: right;">
                ${isUnread ? `<span class="unread-badge">${partner.unreadCount}</span><br>` : ''}
                <span style="font-size:11px; color:#666; display:block; margin-bottom:5px;">${partner.time}</span>
                <button class="btn-chat">Open</button>
            </div>`;
        listContainer.appendChild(item);
    }
}

async function updateInboxCount() {
    const { count } = await mySupabase.from('messages').select('*', { count: 'exact', head: true }).eq('receiver_id', globalUser.id).eq('read_status', false);
    const countSpan = document.getElementById('inbox-count');
    if (countSpan) {
        countSpan.style.display = count > 0 ? 'inline-block' : 'none';
        countSpan.innerText = count || 0;
    }
}

function listenToLiveInbox() {
    mySupabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${globalUser.id}` }, () => {
        loadInboxData();
        updateInboxCount();
    }).subscribe();
}

window.addEventListener("DOMContentLoaded", initInbox);
</script>
</body>
</html>
