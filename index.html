<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIFABOY | Messi Watch</title>
<meta name="description" content="Community Archive of Football Refereeing Discussions">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
<div class="logo">
⚽ <span>FIFABOY</span>
</div>
<div class="menu">
<a href="index.html">Home</a>
<a href="#feed">Feed</a>
<a href="login.html" id="loginLink">Login</a>
<a href="register.html" id="registerLink">Register</a>
<a href="profile.html" id="profileLink" style="display:none;">Profile</a>
<a href="admin.html" id="adminLink" style="display:none;">Admin</a>
<a href="#" id="logoutLink" style="display:none;" onclick="logout();return false;">Logout</a>
</div>
</nav>

<section class="hero">
<h1>MESSI WATCH</h1>
<p>Community Archive of Football Refereeing Discussions Involving Lionel Messi</p>
<div class="buttons">
<button id="explore" onclick="document.getElementById('feed').scrollIntoView({behavior:'smooth'})">
Explore Evidence
</button>
<button id="upload" onclick="openUpload()">
Upload Evidence
</button>
</div>
</section>

<section class="notice">
⚠️ Community submitted content. Verify information before sharing.
</section>

<section class="search">
<input id="search" type="text" placeholder="Search player, match, tournament...">
</section>

<section class="categories">
<button>Latest</button>
<button>Trending</button>
<button>Penalty</button>
<button>Red Card</button>
<button>Handball</button>
<button>VAR</button>
<button>Community</button>
</section>

<section id="feed">
<div class="loading">
Loading Posts...
</div>
</section>

<button id="fab" onclick="openUpload()">+</button>

<button id="topBtn" onclick="scrollTopPage()">⬆</button>

<footer>
<h2>⚽ FIFABOY</h2>
<p>Watch • Verify • Discuss</p>
<p>©2026 FIFABOY</p>
</footer>

<script>
// ১. আপনার আসল Supabase ক্রেডেনশিয়াল সরাসরি এখানেই ইনিশিয়াল করা হলো
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let POSTS = []; // গ্লোবাল ভ্যারিয়েবল যাতে সার্চ ফিল্টার কাজ করতে পারে

// ২. ইউজার লগইন স্টেট এবং মেনুবার বাটন কন্ট্রোল ফাংশন
async function initPage(){
    try {
        const { data: { user }, error: userError } = await mySupabase.auth.getUser();

        const login = document.getElementById("loginLink");
        const register = document.getElementById("registerLink");
        const profile = document.getElementById("profileLink");
        const admin = document.getElementById("adminLink");
        const logoutBtn = document.getElementById("logoutLink");

        if(user){
            if(login) login.style.display = "none";
            if(register) register.style.display = "none";
            if(profile) profile.style.display = "inline-block";
            if(logoutBtn) logoutBtn.style.display = "inline-block";

            // profiles টেবিল থেকে রোল চেক (ইউজার এডমিন কিনা)
            const { data: profileData } = await mySupabase
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();

            if(profileData && profileData.role === 'admin' && admin){
                admin.style.display = "inline-block";
            }
        } else {
            if(login) login.style.display = "inline-block";
            if(register) register.style.display = "inline-block";
            if(profile) profile.style.display = "none";
            if(admin) admin.style.display = "none";
            if(logoutBtn) logoutBtn.style.display = "none";
        }
    } catch(e) {
        console.error("Init Error:", e);
    }
}

// ৩. Supabase থেকে সব পোস্ট বা এভিডেন্স ডাটা তুলে আনার ফাংশন
async function loadPosts() {
    const feedSection = document.getElementById("feed");
    try {
        const { data, error } = await mySupabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        POSTS = data || [];
        renderPosts(POSTS);
    } catch (e) {
        console.error("Load Posts Error:", e);
        if(feedSection) {
            feedSection.innerHTML = `<div class="error" style="color:#ff6b6b; text-align:center; padding:20px;">Failed to load posts: ${e.message}</div>`;
        }
    }
}

// ৪. ডাটাবেজের পোস্টগুলো HTML আকারে ফিডে দেখানোর ফাংশন
function renderPosts(postsList) {
    const feedSection = document.getElementById("feed");
    if (!feedSection) return;

    if (!postsList || postsList.length === 0) {
        feedSection.innerHTML = `<div class="no-posts" style="text-align:center; padding:20px; color:#aaa;">No evidence or posts found in database.</div>`;
        return;
    }

    feedSection.innerHTML = "";
    postsList.forEach(post => {
        const postCard = document.createElement("div");
        postCard.className = "post-card";
        
        // যদি পোস্টে কোনো ইমেজ বা মিডিয়া ফাইল থাকে
        let mediaHTML = "";
        if (post.url) {
            mediaHTML = `<img src="${post.url}" alt="Evidence" style="max-width:100%; border-radius:8px; margin-top:10px;">`;
        }

        postCard.innerHTML = `
            <div class="post-header" style="display:flex; justify-content:between; align-items:center;">
                <h3 style="margin:0; color:#3ecf8e;">${post.title || "Untitled Discussion"}</h3>
                <span class="badge" style="background:#444; font-size:12px; padding:2px 8px; border-radius:4px; margin-left:10px;">${post.platform || "Community"}</span>
            </div>
            <p class="post-desc" style="color:#ccc; margin-top:10px;">${post.description || "No description provided."}</p>
            ${mediaHTML}
            <div class="post-footer" style="margin-top:10px; font-size:12px; color:#777;">
                <small>Posted on: ${new Date(post.created_at).toLocaleDateString()}</small>
            </div>
        `;
        feedSection.appendChild(postCard);
    });
}

// ৫. লগআউট হ্যান্ডেল করার ফাংশন
async function logout() {
    try {
        const { error } = await mySupabase.auth.signOut();
        if (error) throw error;
        alert("Logged out successfully!");
        window.location.reload();
    } catch(e) {
        alert("Logout failed: " + e.message);
    }
}

// ৬. আপলোড বাটন ওপেন করার বেসিক ফাংশন (টেস্ট অ্যালার্ট তুলে এখানে আপনার লিংক বা মডাল দিতে পারেন)
function openUpload() {
    alert("Upload module ready! You can now create your upload workflow.");
}

// স্ক্রল টপ ফাংশন
function scrollTopPage() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ইভেন্ট লিসেনারস (পুরোনো ফাইল থেকে এনে ঠিক করা হয়েছে)
window.addEventListener("scroll", () => {
    const top = document.getElementById("topBtn");
    if(top) {
        if (window.scrollY > 250) {
            top.style.display = "flex";
        } else {
            top.style.display = "none";
        }
    }
});

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    const filtered = POSTS.filter(post =>
        (post.title || "").toLowerCase().includes(q) ||
        (post.description || "").toLowerCase().includes(q) ||
        (post.platform || "").toLowerCase().includes(q)
    );
    renderPosts(filtered);
});

window.addEventListener("online", loadPosts);
window.addEventListener("focus", loadPosts);

window.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        const search = document.getElementById("search");
        if(search) {
            search.value = "";
            renderPosts(POSTS);
        }
    }
});

// পেজ লোড হলেই রান হবে
window.addEventListener("DOMContentLoaded", () => {
    initPage();
    loadPosts();
});
</script>

</body>
</html>
