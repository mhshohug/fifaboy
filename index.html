<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
    .modal-content { background-color: #2a2a2a; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); color: white; }
    .embed-container { margin-top: 12px; width: 100%; overflow: hidden; border-radius: 8px; background: #1f1f1f; display: flex; justify-content: center; }
    .embed-container iframe { border: none; width: 100%; min-height: 500px; }
    .action-btn { background:transparent; border:none; color:#aaa; font-size:14px; cursor:pointer; padding:6px 10px; }
    .action-btn.liked { color: #3ecf8e !important; }
    .action-btn.disliked { color: #ff6b6b !important; }
</style>
</head>
<body>

<nav class="navbar">

</div>
</nav>

<section class="hero">
<h1>MESSI WATCH</h1>
<p>Community Archive of Football Refereeing Discussions Involving Lionel Messi</p>
<div class="buttons">
<button onclick="document.getElementById('feed').scrollIntoView({behavior:'smooth'})">Explore Evidence</button>
<button onclick="openUpload()">Upload Evidence</button>
</div>
</section>

<section id="feed"><div class="loading">Loading Posts...</div></section>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let POSTS = [];
let USER_VOTES = [];
let currentUserId = null;

// ইনবক্স কাউন্ট লজিক
window.addEventListener("DOMContentLoaded", async () => {
    const { data: { user } } = await mySupabase.auth.getUser();
    if (user) {
        async function updateInboxCount() {
            const { count } = await mySupabase.from('messages').select('*', { count: 'exact', head: true }).eq('receiver_id', user.id).eq('read_status', false);
            const countSpan = document.getElementById('inbox-count');
            if (countSpan) {
                countSpan.style.display = count > 0 ? 'inline-block' : 'none';
                countSpan.innerText = count;
            }
        }
        updateInboxCount();
        mySupabase.channel('inbox_count_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${user.id}` }, () => updateInboxCount()).subscribe();
    }
    loadPosts();
});

// মিডিয়া এমবেড লজিক (টিকটক ফিক্সড)
function getMediaEmbedHTML(url) {
    if (!url) return "";
    let checkUrl = url.toLowerCase();
    if (checkUrl.includes("youtube.com") || checkUrl.includes("youtu.be")) {
        let id = url.includes("shorts/") ? url.split("shorts/")[1].split("?")[0] : (url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1].split("?")[0]);
        return `<div class="embed-container"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
    }
    if (checkUrl.includes("tiktok.com")) {
        return `<div class="embed-container" style="padding:20px;"><a href="${url}" target="_blank" style="color:#3ecf8e; font-weight:bold;">▶ Watch on TikTok</a></div>`;
    }
    return `<img src="${url}" style="max-width:100%; border-radius:8px;">`;
}

// পোস্ট রেন্ডার লজিক
function renderPosts(postsList) {
    const feedSection = document.getElementById("feed");
    if (!feedSection) return;
    feedSection.innerHTML = "";
    postsList.forEach(post => {
        const postCard = document.createElement("div");
        postCard.className = "post-card";
        postCard.innerHTML = `
            <h3>${post.title || "Untitled"}</h3>
            <p>${post.description || ""}</p>
            ${getMediaEmbedHTML(post.url)}
            <div style="margin-top:10px;">
                <button class="action-btn">👍 ${post.likes || 0}</button>
                <button class="action-btn">👎 ${post.dislikes || 0}</button>
            </div>
        `;
        feedSection.appendChild(postCard);
    });
}

async function loadPosts() {
    const { data, error } = await mySupabase.from('posts').select('*').order('created_at', { ascending: false });
    if (!error) { POSTS = data || []; renderPosts(POSTS); }
}

async function logout() { await mySupabase.auth.signOut(); window.location.reload(); }
</script>
</body>
</html>
