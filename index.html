function getMediaEmbedHTML(url, containerId) {
    if (!url) return "";
    
    let checkUrl = url.toLowerCase();
    
    // ১. YouTube
    if (checkUrl.includes("youtube.com") || checkUrl.includes("youtu.be")) {
        let videoId = "";
        if (url.includes("shorts/")) videoId = url.split("shorts/")[1].split("?")[0];
        else if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
        else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
        return '<div class="embed-container"><iframe src="https://www.youtube.com/embed/' + videoId + '" allowfullscreen></iframe></div>';
    }
    
    // ২. Facebook
    if (checkUrl.includes("facebook.com") || checkUrl.includes("fb.watch")) {
        setTimeout(() => {
            fetchFacebookEmbed(url, containerId);
        }, 50);
        return '<div class="embed-container" id="' + containerId + '"><div style="color:#aaa; text-align:center; padding:20px;">Loading Video...</div></div>';
    }
    
    // ৩. TikTok
    if (checkUrl.includes("tiktok.com")) {
        let cleanUrl = url.split("?")[0];
        if (cleanUrl.endsWith('/')) cleanUrl = cleanUrl.slice(0, -1);
        const videoId = cleanUrl.split('/').pop(); 
        return '<div class="embed-container"><iframe src="https://www.tiktok.com/embed/' + videoId + '" width="100%" height="550" frameborder="0" allowfullscreen></iframe></div>';
    }
    
    // ৪. Twitter/X
    if (checkUrl.includes("twitter.com") || checkUrl.includes("x.com")) {
        return '<div class="embed-container" style="background:transparent;"><blockquote class="twitter-tweet" data-theme="dark"><a href="' + url + '"></a></blockquote></div>';
    }
    
    // ৫. Instagram
    if (checkUrl.includes("instagram.com")) {
        let cleanUrl = url.split("?")[0];
        if (cleanUrl.includes("/embed")) cleanUrl = cleanUrl.replace("/embed", "");
        if (!cleanUrl.endsWith("/")) cleanUrl += "/";
        return '<div class="embed-container"><iframe src="' + cleanUrl + 'embed/" width="100%" height="480" frameborder="0" scrolling="no" allowtransparency="true" style="border:none; border-radius:8px; background:#1f1f1f;"></iframe></div>';
    }
    
    return '<img src="' + url + '" alt="Evidence" style="max-width:100%; border-radius:8px; margin-top:10px; display:block;">';
}

async function fetchFacebookEmbed(facebookUrl, targetId) {
    const container = document.getElementById(targetId);
    if (!container) return;

    try {
        let cleanUrl = facebookUrl.split("?")[0];
        let fallbackUrl = "https://www.facebook.com/plugins/video.php?href=" + encodeURIComponent(cleanUrl) + "&show_text=false&width=500";
        container.innerHTML = '<iframe src="' + fallbackUrl + '" width="100%" height="500" style="border:none;overflow:hidden;border-radius:8px;" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>';
    } catch (err) {
        console.error("Facebook Embed Error: ", err);
        container.innerHTML = '<div style="color:#ff6b6b; padding:10px; text-align:center;">Video unavailable</div>';
    }
}

async function initPage(){
    try {
        const { data: { user } } = await mySupabase.auth.getUser();
        const login = document.getElementById("loginLink");
        const register = document.getElementById("registerLink");
        const profile = document.getElementById("profileLink");
        const admin = document.getElementById("adminLink");
        const logoutBtn = document.getElementById("logoutLink");

        if(user){
            currentUserId = user.id;
            if(login) login.style.display = "none";
            if(register) register.style.display = "none";
            if(profile) profile.style.display = "inline-block";
            if(logoutBtn) logoutBtn.style.display = "inline-block";

            const { data: profileData } = await mySupabase.from('profiles').select('role').eq('id', user.id).maybeSingle();
            if(profileData && profileData.role === 'admin' && admin){
                admin.style.display = "inline-block";
            }
            
            const { data: votesData } = await mySupabase.from('votes').select('post_id, vote').eq('user_id', user.id);
            USER_VOTES = votesData || [];
            
        } else {
            currentUserId = null;
            if(login) login.style.display = "inline-block";
            if(register) register.style.display = "inline-block";
            if(profile) profile.style.display = "none";
            if(admin) admin.style.display = "none";
            if(logoutBtn) logoutBtn.style.display = "none";
            USER_VOTES = [];
        }
    } catch(e) { console.error(e); }
}

async function loadPosts() {
    const feedSection = document.getElementById("feed");
    try {
        const { data, error } = await mySupabase.from('posts').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        POSTS = data || [];
        renderPosts(POSTS);
    } catch (e) {
        if(feedSection) feedSection.innerHTML = '<div class="error" style="color:#ff6b6b; text-align:center; padding:20px;">Failed to load: ' + e.message + '</div>';
    }
}

        postCard.innerHTML = `
            <div class="post-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:#3ecf8e; cursor:pointer;" onclick="window.location.href='post.html?id=${post.id}'">

                </h3>

            <div style="font-size:11px; color:#888; margin:5px 0 10px;">
                Posted By: <span class="comment-user-link" onclick="viewPublicProfile('${post.user_id}')">${userShortId}</span>
            </div>
            
            <p class="post-desc" style="color:#ccc; line-height:1.5; cursor:pointer;" onclick="window.location.href='post.html?id=${post.id}'">
                ${post.description || ""}
            </p>
            
            ${mediaHTML}
            
            <div class="interaction-bar" style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:12px; border-top:1px solid #383838; width: 100%;">
                <button class="action-btn ${likeClass}" onclick="votePost(${post.id}, this)" style="background:transparent; border:none; color:#aaa; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 10px; font-family:inherit;">
                     👍 <span>Vote (<span class="vote-num">${voteCount}</span>)</span>
                </button>
                <button class="action-btn ${dislikeClass}" onclick="dislikePost(${post.id}, this)" style="background:transparent; border:none; color:#aaa; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 10px; font-family:inherit;">
                     👎 <span>Dislike (<span class="dislike-num">${dislikeCount}</span>)</span>
                </button>
                <button class="action-btn" onclick="window.location.href='post.html?id=${post.id}'" style="background:transparent; border:none; color:#aaa; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 10px; font-family:inherit;">
                     💬 <span>Comment</span>
                </button>
                <button class="action-btn" onclick="sharePost('${post.title}', ${post.id})" style="background:transparent; border:none; color:#aaa; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 10px; font-family:inherit;">

                     🚩 <span>Report</span>
                </button>
            </div>
        `;
        feedSection.appendChild(postCard);
    });

    if(window.twttr && window.twttr.widgets) window.twttr.widgets.load();
}

function viewPublicProfile(uid) {
    if(!uid) return;
    if(currentUserId && uid === currentUserId) {
        window.location.href = "profile.html";
    } else {
        window.location.href = `profile.html?uid=${uid}`;
    }
}
