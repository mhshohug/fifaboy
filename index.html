<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">

⚽ <span>FIFABOY</span>

</div>

<div class="menu">

<a href="index.html">Home</a>

<a href="#feed">Feed</a>

<a href="login.html" id="loginLink">Login</a>

<a href="register.html" id="registerLink">Register</a>

<a href="profile.html" id="profileLink" style="display:none;">Profile</a>

<a href="admin.html" id="adminLink" style="display:none;">Admin</a>

<a href="#" id="logoutLink" style="display:none;" onclick="logout();return false;">Logout</a>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>

MESSI WATCH

</h1>

<p>

Community Archive of Football Refereeing Discussions Involving Lionel Messi

</p>

<div class="buttons">

<button id="explore" onclick="document.getElementById('feed').scrollIntoView({behavior:'smooth'})">

Explore Evidence

</button>

<button id="upload" onclick="openUpload()">

Upload Evidence

</button>

</div>

</section>

<!-- NOTICE -->

<section class="notice">

⚠️ Community submitted content. Verify information before sharing.

</section>

<!-- SEARCH -->

<section class="search">

<input
id="search"
type="text"
placeholder="Search player, match, tournament...">

</section>

<!-- CATEGORY -->

<section class="categories">

<button>Latest</button>

<button>Trending</button>

<button>Penalty</button>

<button>Red Card</button>

<button>VAR</button>

<button>Community</button>

</section>

<section id="feed">

<div class="loading">

Loading Posts...

</div>
</section>

<!-- FLOAT BUTTON -->

<button id="fab" onclick="openUpload()">

+

</button>

<!-- BACK TO TOP -->

<button id="topBtn" onclick="scrollTopPage()">

⬆

</button>

<!-- FOOTER -->

<footer>

<h2>

⚽ FIFABOY

</h2>

<p>

Watch • Verify • Discuss

</p>

<p>

©2026 FIFABOY

</p>

</footer>

<script src="js/app.js"></script>

<script>

async function initPage(){

try{

const user=await getUser();

const login=document.getElementById("loginLink");
const register=document.getElementById("registerLink");
const profile=document.getElementById("profileLink");
const admin=document.getElementById("adminLink");
const logout=document.getElementById("logoutLink");

if(user){

login.style.display="none";
register.style.display="none";

profile.style.display="inline-block";
logout.style.display="inline-block";

if(await isAdmin()){

admin.style.display="inline-block";

}

}else{

login.style.display="inline-block";
register.style.display="inline-block";

profile.style.display="none";
admin.style.display="none";
logout.style.display="none";

}

}catch(e){

console.error(e);

}

}

window.addEventListener("load",initPage);

window.addEventListener("scroll",()=>{

const top=document.getElementById("topBtn");

if(window.scrollY>250){

top.style.display="flex";

}else{

top.style.display="none";

}

});

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

if(typeof POSTS==="undefined") return;

const filtered=POSTS.filter(post=>

(post.title||"").toLowerCase().includes(q)||

(post.description||"").toLowerCase().includes(q)||

(post.platform||"").toLowerCase().includes(q)

);

renderPosts(filtered);

});
  document.getElementById("fab").addEventListener("click",()=>{

openUpload();

});

window.addEventListener("online",()=>{

loadPosts();

});

window.addEventListener("focus",()=>{

loadPosts();

});

window.addEventListener("keydown",e=>{

if(e.key==="Escape"){

const search=document.getElementById("search");

search.value="";

renderPosts(POSTS);

}

});

window.addEventListener("load",()=>{

loadPosts();

});

</script>

</body>

</html>
