<script>
async function loginUser() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    
    const loginBtn = document.getElementById("loginLink") || document.querySelector("button");
    const originalText = loginBtn.innerText;

    if(!email || !password) {
        alert("ইমেইল এবং পাসওয়ার্ড দিন!");
        return;
    }

    try {
        loginBtn.innerText = "Logging in...";
        loginBtn.disabled = true;

        // Supabase-এ লগইন রিকোয়েস্ট
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) throw error;

        if (data.user) {
            alert("লগইন সফল হয়েছে!");
            window.location.href = "index.html"; // সরাসরি হোম পেজে ব্যাক করবে
        }

    } catch (e) {
        console.error(e);
        alert("লগইন করা যায়নি: " + e.message);
    } finally {
        loginBtn.innerText = originalText;
        loginBtn.disabled = false;
    }
}
// আপনার লগইন বাটনের onclick="loginUser()" সেট করে দিন
</script>
