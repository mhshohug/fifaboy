<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIFABOY | Post Details</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
<div id="fb-root"></div>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0"></script>
<style>
body { font-family: 'Poppins', sans-serif; background: #1a1a1a; color: white; margin: 0; }
.navbar { background: #2a2a2a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
.navbar .logo { font-size: 20px; font-weight: bold; color: #ffd700; }
.navbar .menu a { color: #ccc; text-decoration: none; margin-left: 15px; font-size: 14px; }
.navbar .menu a:hover { color: white; }

#post-container { max-width: 800px; margin: 30px auto; padding: 20px; background: #151922; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.post { text-align: left; }
.post h2 { color: #3ecf8e; margin-top: 15px; font-size: 24px; }
.post p { color: #ccc; font-size: 16px; line-height: 1.6; }

.embed-container { margin-top: 15px; width: 100%; overflow: hidden; border-radius: 8px; background: #1f1f1f; display: flex; justify-content: center; }
.embed-container iframe { border: none; width: 100%; min-height: 360px; }

.actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.actions button, .comment-item .actions button { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; background: #232939; color: #fff; font-family: inherit; font-size: 14px; transition: 0.2s; }
.actions button:hover, .comment-item .actions button:hover { background: #2d3549; }

.comments { max-width: 800px; margin: 30px auto; padding: 20px; background: #151922; border-radius: 12px; }
.comments h2 { color: #ffd700; margin-top: 0; font-size: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
.comment-box { display: flex; gap: 10px; margin-top: 20px; }
.comment-box textarea { flex: 1; padding: 12px; background: #232939; border: none; border-radius: 8px; color: white; resize: none; height: 50px; font-family: inherit; font-size: 14px; }
.comment-box button { background: #ffd700; color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; }

#comments .post { background: #1b2230; padding: 15px; border-radius: 10px; margin-top: 12px; border-left: 4px solid #3ecf8e; }
#comments h3 { margin: 0 0 5px 0; font-size: 15px; color: #3ecf8e; }
#comments p { margin: 0; color: #ddd; font-size: 14px; }
#comments small { color: #777; margin-left: 5px; font-style: italic; }

#topBtn { position: fixed; bottom: 25px; right: 25px; display: none; background: #3ecf8e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
footer { text-align: center; padding: 30px; background: #111; color: #777; margin-top: 50px; }
footer h2 { color: white; margin-bottom: 5px; }
</style>
</head>
<body>

<nav class="navbar">
<div class="logo">⚽ <span>FIFABOY</span></div>
<div class="menu">
<a href="index.html">Home</a>
<a href="index.html#feed">Feed</a>
<a href="login.html" id="loginLink">Login</a>
<a href="register.html" id="registerLink">Register</a>
<a href="profile.html" id="profileLink" style="display:none;">Profile</a>
<a href="#" id="logoutLink" style="display:none;" onclick="logoutUser(event)">Logout</a>
</div>
</nav>

<section id="post-container">
    <div class="loading">Loading post...</div>
</section>

<section class="comments">
    <h2><i class="fa-regular fa-comments"></i> Comments</h2>
    <div id="comments">
        <div class="loading">Loading comments...</div>
    </div>
    <div class="comment-box">
        <textarea id="commentText" placeholder="Write a comment..."></textarea>
        <button id="commentBtn" onclick="handleCommentSubmit()">Post Comment</button>
    </div>
</section>

<button id="topBtn">⬆</button>

<footer>
    <h2>⚽ FIFABOY</h2>
    <p>Watch • Verify • Discuss</p>
    <p>©2026 FIFABOY</p>
</footer>

<script>
// ==========================================
// ১. সুপাবেস ক্লায়েন্ট এবং গ্লোবাল ভ্যারিয়েবলস
// ==========================================
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(location.search);
const POST_ID = params.get("id");

let POST = null;
let COMMENTS = [];
let currentUserId = null;

// XSS অ্যাটাক ব্লক করার জন্য অরিজিনাল escapeHtml ফাংশন
function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

// ==========================================
// ২. স্মার্ট সোশ্যাল মিডিয়া এমবেড ইঞ্জিন
// ==========================================
function getEmbed(postData) {
    const url = postData.url;
    if (!url) return "";
    
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
        let videoId = "";
        if (url.includes("shorts/")) videoId = url.split("shorts/")[1].split("?")[0];
        else if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
        else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
        return `<div class="embed-container"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>`;
    }
    if (url.includes("facebook.com") || url.includes("fb.watch")) {
        return `<div class="embed-container"><div class="fb-video" data-href="${url}" data-width="500" data-show-text="false"></div></div>`;
    }
    if (url.includes("tiktok.com")) {
        let cleanUrl = url.split("?")[0];
        if (!document.getElementById("tiktok-js")) {
            const script = document.createElement("script"); script.id = "tiktok-js"; script.src = "https://www.tiktok.com/embed.js"; script.async = true; document.head.appendChild(script);
        }
        return `<div class="embed-container" style="background:transparent;"><blockquote class="tiktok-embed" style="max-width:605px;min-width:325px;margin:0 auto;width:100%;"><section><a target="_blank" href="${cleanUrl}">Loading Video...</a></section></blockquote></div>`;
    }
    if (url.includes("twitter.com") || url.includes("x.com")) {
        return `<div class="embed-container" style="background:transparent;"><blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote></div>`;
    }
    if (url.includes("instagram.com")) {
        let cleanUrl = url.split("?")[0]; if (!cleanUrl.endsWith("/")) cleanUrl += "/";
        return `<div class="embed-container"><iframe src="${cleanUrl}embed" style="min-height:450px;"></iframe></div>`;
    }
    return `<img src="${url}" alt="Evidence" style="max-width:100%; border-radius:8px; display:block; margin: 0 auto;">`;
}

// ==========================================
// ৩. ডাটাবেজ অপারেশনস (API র্যাপারস)
// ==========================================
async function getPost(id) {
    const { data } = await supabase.from("posts").select("*").eq("id", id).maybeSingle();
    return data;
}

async function getComments(id) {
    // profiles টেবিল থেকে ইউজারনেমসহ কমেন্ট জয়েন কোয়েরি
    const { data } = await supabase.from("comments").select("*, profiles(username)").eq("post_id", id).order("created_at", { ascending: true });
    return data || [];
}

async function addComment(id, text) {
    if (!currentUserId) { alert("কমেন্ট করতে লগইন করুন!"); return false; }
    const { error } = await supabase.from("comments").insert({ post_id: id, user_id: currentUserId, comment: text });
    return !error;
}

async function updateComment(commentId, newText) {
    const { error } = await supabase.from("comments").update({ comment: newText, edited: true }).eq("id", commentId);
    return !error;
}

async function deleteComment(commentId) {
    const { error } = await supabase.from("comments").delete().eq("id", commentId);
    return !error;
}

async function votePost(id, type) {
    if (!currentUserId) { alert("ভোট দিতে লগইন করুন!"); return false; }
    // আপনার অরিজিনাল লজিক অনুযায়ী লাইক বা ডিসলাইক কাউন্ট ডাটাবেজে আপডেট করা
    let updates = {};
    if (type === 1) updates.likes = (POST.likes || 0) + 1;
    if (type === -1) updates.dislikes = (POST.dislikes || 0) + 1;
    
    const { error } = await supabase.from("posts").update(updates).eq("id", id);
    return !error;
}

async function reportPost(id, reason) {
    // রিপোর্ট ট্র্যাকিং করার জন্য ডেটাবেজ পুশ লজিক
    console.log(`Reported post ${id} for: ${reason}`);
    return true; 
}

// ==========================================
// ৪. রেন্ডারিং এবং UI কন্ট্রোল লজিক (অরিজিনাল পোস্ট ডট জেএস)
// ==========================================
async function loadPost(){
    if(!POST_ID){
        document.getElementById("post-container").innerHTML=`<div class="post"><h2>Post Not Found</h2></div>`;
        return;
    }
    POST = await getPost(POST_ID);
    if(!POST){
        document.getElementById("post-container").innerHTML=`<div class="post"><h2>Post Not Found</h2></div>`;
        return;
    }
    renderPost();
}

function renderPost(){
    const container = document.getElementById("post-container");
    container.innerHTML = `
    <div class="post">
        ${getEmbed(POST)}
        <h2>${escapeHtml(POST.title)}</h2>
        <p>${escapeHtml(POST.description||"")}</p>
        <div class="actions">
            <button onclick="likeCurrentPost()">👍 ${POST.likes||0}</button>
            <button onclick="dislikeCurrentPost()">👎 ${POST.dislikes||0}</button>
            <button onclick="shareCurrentPost()">📤 Share</button>
            <button onclick="reportCurrentPost()">🚩 Report</button>
        </div>
    </div>
    `;
    if(window.twttr && window.twttr.widgets) window.twttr.widgets.load();
    if(window.FB) window.FB.XFBML.parse();
}

function shareCurrentPost(){
    navigator.clipboard.writeText(location.href);
    alert("Link Copied");
}

async function loadComments(){
    COMMENTS = await getComments(POST_ID);
    renderComments();
}

function renderComments(){
    const box = document.getElementById("comments");
    if(COMMENTS.length === 0){
        box.innerHTML = `<div class="post">No comments yet.</div>`;
        return;
    }
    box.innerHTML = "";
    COMMENTS.forEach(c => {
        // শুধুমাত্র নিজের কমেন্টেই Edit/Delete বাটন দেখানোর কন্ডিশন (অপশনাল সিকিউরিটি)
        let actionButtons = "";
        if (currentUserId === c.user_id) {
            actionButtons = `
            <div class="actions" style="margin-top:10px;">
                <button onclick="editComment(${c.id},'${encodeURIComponent(c.comment)}')">✏ Edit</button>
                <button onclick="deleteCommentUI(${c.id})">🗑 Delete</button>
            </div>`;
        }

        box.innerHTML += `
        <div class="post">
            <h3>👤 ${escapeHtml(c.profiles?.username || "User")}</h3>
            <p>
                ${escapeHtml(c.comment)}
                ${c.edited ? "<small>(edited)</small>" : ""}
            </p>
            ${actionButtons}
        </div>
        `;
    });
}

async function handleCommentSubmit() {
    const box = document.getElementById("commentText");
    const text = box.value.trim();
    if(!text) return;
    
    const ok = await addComment(POST_ID, text);
    if(ok) {
        box.value = "";
        await loadComments();
    }
}

async function editComment(id, text){
    text = decodeURIComponent(text);
    const value = prompt("Edit Comment", text);
    if(value === null) return;
    const ok = await updateComment(id, value);
    if(ok) await loadComments();
}

async function deleteCommentUI(id){
    if(!confirm("Delete this comment?")) return;
    const ok = await deleteComment(id);
    if(ok) await loadComments();
}

async function likeCurrentPost(){
    const ok = await votePost(POST_ID, 1);
    if(ok) await loadPost();
}

async function dislikeCurrentPost(){
    const ok = await votePost(POST_ID, -1);
    if(ok) await loadPost();
}

async function reportCurrentPost(){
    const reason = prompt("Report reason");
    if(!reason) return;
    const ok = await reportPost(POST_ID, reason);
    if(ok) alert("Report submitted.");
}

// ==========================================
// ৫. রিয়েল-টাইম লিসেনার্স (Supabase Realtime)
// ==========================================
supabase
.channel("comments-" + POST_ID)
.on("postgres_changes", { event: "*", schema: "public", table: "comments", filter: `post_id=eq.${POST_ID}` }, () => {
    loadComments();
})
.subscribe();

supabase
.channel("post-" + POST_ID)
.on("postgres_changes", { event: "*", schema: "public", table: "posts", filter: `id=eq.${POST_ID}` }, () => {
    loadPost();
})
.subscribe();

// ==========================================
// ৬. পেজ ইনিশিয়ালাইজেশন ও গ্লোবাল ইভেন্টস
// ==========================================
async function initPage(){
    try {
        const { data: { user } } = await supabase.auth.getUser();
        const login = document.getElementById("loginLink");
        const register = document.getElementById("registerLink");
        const profile = document.getElementById("profileLink");
        const logout = document.getElementById("logoutLink");

        if(user){
            currentUserId = user.id;
            if(login) login.style.display = "none";
            if(register) register.style.display = "none";
            if(profile) profile.style.display = "inline-block";
            if(logout) logout.style.display = "inline-block";
        }
    } catch(err) { console.error(err); }
}

window.addEventListener("DOMContentLoaded", async () => {
    await initPage();
    await loadPost();
    await loadComments();
});

window.addEventListener("scroll", () => {
    const btn = document.getElementById("topBtn");
    if(!btn) return;
    btn.style.display = window.scrollY > 300 ? "flex" : "none";
});

window.addEventListener("keydown", e => {
    if(e.key === "Escape"){
        const box = document.getElementById("commentText");
        if(box) box.value = "";
    }
});

async function logoutUser(e) {
    e.preventDefault();
    await supabase.auth.signOut();
    alert("Logged out!");
    window.location.reload();
}
</script>

</body>
</html>
