<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIFABOY | Details</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
<style>
body {
    background-color: #121212;
    color: white;
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
}
.details-container {
    max-width: 600px;
    margin: 30px auto;
    background: #1e1e1e;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    box-sizing: border-box;
}
.post-title { color: #3ecf8e; font-size: 22px; margin-top: 0; }
.post-desc { color: #ccc; line-height: 1.6; margin: 15px 0; }
.badge { background: #444; color: #3ecf8e; font-size: 12px; padding: 4px 10px; border-radius: 4px; display: inline-block; }

/* এমবেড করা মিডিয়া বক্সের প্রপার সাইজ */
.embed-container {
    margin-top: 15px;
    width: 100%;
    max-width: 100%;
    overflow: hidden;
    border-radius: 8px;
    background: #1f1f1f;
    display: flex;
    justify-content: center;
}
.embed-container iframe {
    border: none;
    width: 100%;
    min-height: 500px;
}

/* কমেন্ট সেকশন স্টাইল */
.comment-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
.comment-section h3 { color: #f5c518; display: flex; align-items: center; gap: 8px; margin-top: 0; }
.comment-input-box { display: flex; gap: 10px; margin-top: 15px; }
.comment-input-box input {
    flex: 1; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; font-family: inherit;
}
.btn-comment { background: #f5c518; color: black; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
.comments-list { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
.comment-card { background: #252525; padding: 12px; border-radius: 8px; border-left: 4px solid #3ecf8e; text-align: left; }
.comment-user { font-size: 13px; color: #3ecf8e; font-weight: 600; }
.comment-text { font-size: 14px; color: #ddd; margin: 5px 0 0; }
</style>
</head>
<body>

<nav class="navbar">
<div class="logo">⚽ <span>FIFABOY</span></div>
<div class="menu">
<a href="index.html">Home</a>
<a href="index.html#feed">Feed</a>
<a href="profile.html">Profile</a>
</div>
</nav>

<div class="details-container">
    <div id="postDetails">
        <div style="text-align:center; padding:40px; color:#aaa;">Loading post...</div>
    </div>

    <!-- কমেন্ট সেকশন -->
    <div class="comment-section">
        <h3>💬 Comments</h3>
        <div class="comment-input-box">
            <input type="text" id="commentText" placeholder="Write a comment...">
            <button class="btn-comment" onclick="submitComment()">Post Comment</button>
        </div>
        <div id="commentsContainer" class="comments-list">
            <div style="color:#aaa; font-size:13px;">Loading comments...</div>
        </div>
    </div>
</div>

<footer>
<h2>⚽ FIFABOY</h2>
<p>Watch • Verify • Discuss</p>
<p>©2026 FIFABOY</p>
</footer>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentPostId = null;
let currentUserId = null;
let currentUserEmail = "";

// ইউআরএল থেকে আইডি এবং ডাটাবেজ থেকে ডাটা লোড করার মেইন ফাংশন
async function loadPostDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const idParam = urlParams.get('id');
    
    if (!idParam) {
        document.getElementById("postDetails").innerHTML = `<div style="color:#ff6b6b; text-align:center;">No post ID found!</div>`;
        return;
    }
    
    // আইডিটিকে ইন্টিজারে রূপান্তর (যদি আইডি ডেটাবেজে int8/int4 হয়)
    currentPostId = isNaN(idParam) ? idParam : parseInt(idParam);

    try {
        // ১. লগইন ইউজার চেক
        const { data: { user } } = await mySupabase.auth.getUser();
        if (user) {
            currentUserId = user.id;
            currentUserEmail = user.email;
        }

        // ২. পোস্ট ডাটা কুয়েরি
        const { data: post, error } = await mySupabase
            .from('posts')
            .select('*')
            .eq('id', currentPostId)
            .maybeSingle();

        if (error) throw error;
        if (!post) {
            document.getElementById("postDetails").innerHTML = `<div style="color:#ff6b6b; text-align:center;">Post not found or deleted!</div>`;
            return;
        }

        // ৩. পেজে ডাটা রেন্ডার করা
        renderPostData(post);
        
        // ৪. কমেন্ট লোড করা
        loadComments();

    } catch (e) {
        console.error(e);
        document.getElementById("postDetails").innerHTML = `<div style="color:#ff6b6b; text-align:center;">Error loading details: ${e.message}</div>`;
    }
}

// মিডিয়া এম্বেড জেনারেটর (১০০% ফিক্সড ও বুলেটপ্রুফ আইফ্রেম মেথড)
function getMediaEmbedHTML(url) {
    if (!url) return "";
    
    // ১. YouTube
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
        let videoId = "";
        if (url.includes("shorts/")) videoId = url.split("shorts/")[1].split("?")[0];
        else if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
        else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
        return `<div class="embed-container"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>`;
    }

    // ২. Facebook (Video & Reels ফুল লিংকের ১০০% ওয়ার্কিং আইফ্রেম)
    if (url.includes("facebook.com") || url.includes("fb.watch")) {
        let cleanUrl = url.split("?")[0];
        return `
        <div class="embed-container">
            <iframe 
                src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cleanUrl)}&show_text=false&width=500" 
                width="100%" 
                height="500" 
                style="border:none; overflow:hidden; border-radius:8px;" 
                scrolling="no" 
                frameborder="0" 
                allowfullscreen="true" 
                allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
            </iframe>
        </div>`;
    }

    // ৩. TikTok (ফুল লিংকের জন্য পিওর এমবেড আইফ্রেম)
    if (url.includes("tiktok.com")) {
        let cleanUrl = url.split("?")[0];
        if (cleanUrl.endsWith('/')) cleanUrl = cleanUrl.slice(0, -1);
        const videoId = cleanUrl.split('/').pop(); 
        return `
        <div class="embed-container">
            <iframe src="https://www.tiktok.com/embed/${videoId}" width="100%" height="550" frameborder="0" allowfullscreen></iframe>
        </div>`;
    }

    // ৪. Twitter/X
    if (url.includes("twitter.com") || url.includes("x.com")) {
        return `<div class="embed-container" style="background:transparent;"><blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote></div>`;
    }

    // ৫. Instagram
    if (url.includes("instagram.com")) {
        let cleanUrl = url.split("?")[0]; if (!cleanUrl.endsWith("/")) cleanUrl += "/";
        return `<div class="embed-container"><iframe src="${cleanUrl}embed" style="min-height:450px;"></iframe></div>`;
    }

    return `<img src="${url}" alt="Evidence" style="max-width:100%; border-radius:8px; margin-top:10px; display:block;">`;
}

function renderPostData(post) {
    const container = document.getElementById("postDetails");
    let mediaHTML = getMediaEmbedHTML(post.url);
    
    container.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span class="badge">${post.platform || "Community"}</span>
            <small style="color:#666;">📅 ${new Date(post.created_at).toLocaleDateString('en-GB')}</small>
        </div>
        <h2 class="post-title">${post.title || "Untitled Match"}</h2>
        <p class="post-desc">${post.description || "No description provided."}</p>
        ${mediaHTML}
    `;
    
    if(window.twttr && window.twttr.widgets) window.twttr.widgets.load();
}

// কমেন্ট লোড করার ফাংশন
async function loadComments() {
    const container = document.getElementById("commentsContainer");
    try {
        const { data: comments, error } = await mySupabase
            .from('comments')
            .select('*')
            .eq('post_id', currentPostId)
            .order('created_at', { ascending: true });

        if (error) throw error;

        if (!comments || comments.length === 0) {
            container.innerHTML = `<div style="color:#666; font-size:14px; padding:10px 0;">No comments yet. Be the first to comment!</div>`;
            return;
        }

        container.innerHTML = "";
        comments.forEach(c => {
            const card = document.createElement("div");
            card.className = "comment-card";
            const userDisplay = c.user_email ? c.user_email.split('@')[0] : "Anonymous";
            
            card.innerHTML = `
                <div class="comment-user">👤 ${userDisplay}</div>
                <p class="comment-text">${c.comment_text || ""}</p>
            `;
            container.appendChild(card);
        });

    } catch (e) {
        container.innerHTML = `<div style="color:#ff6b6b; font-size:13px;">Failed to load comments.</div>`;
    }
}

// কমেন্ট সাবমিট করার ফাংশن
async function submitComment() {
    if (!currentUserId) {
        alert("কমেন্ট করতে প্রথমে লগইন করুন!");
        window.location.href = "login.html";
        return;
    }

    const input = document.getElementById("commentText");
    const text = input.value.trim();

    if (!text) {
        alert("কমেন্ট বক্সে কিছু লিখুন!");
        return;
    }

    try {
        const { error } = await mySupabase.from('comments').insert([{
            post_id: currentPostId,
            user_id: currentUserId,
            user_email: currentUserEmail,
            comment_text: text
        }]);

        if (error) throw error;

        input.value = "";
        loadComments(); // কমেন্ট লিস্ট রিফ্রেশ
    } catch (e) {
        alert("Error posting comment: " + e.message);
    }
}

window.addEventListener("DOMContentLoaded", loadPostDetails);
</script>
</body>
</html>
