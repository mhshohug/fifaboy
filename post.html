<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FIFABOY | Details</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
<style>
body { background-color: #121212; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
.details-container { max-width: 600px; margin: 30px auto; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); box-sizing: border-box; }
.post-title { color: #3ecf8e; font-size: 22px; margin-top: 0; }
.post-desc { color: #ccc; line-height: 1.6; margin: 15px 0; }
.badge { background: #444; color: #3ecf8e; font-size: 12px; padding: 4px 10px; border-radius: 4px; display: inline-block; }
.embed-container { margin-top: 15px; width: 100%; max-width: 100%; overflow: hidden; border-radius: 8px; background: #1f1f1f; display: flex; justify-content: center; }
.embed-container iframe { border: none; width: 100%; min-height: 500px; }
.author-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
.btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
.btn-delete { background: #ff6b6b; color: white; }
.btn-edit { background: #3ecf8e; color: white; }
.comment-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
.comment-section h3 { color: #f5c518; margin-top: 0; }
.comment-input-box { display: flex; gap: 10px; margin-top: 15px; }
.comment-input-box input { flex: 1; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; }
.btn-comment { background: #f5c518; color: black; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
.comment-card { background: #252525; padding: 12px; border-radius: 8px; border-left: 4px solid #3ecf8e; display: flex; justify-content: space-between; margin-bottom: 10px; }
.comment-user { font-size: 13px; color: #3ecf8e; cursor: pointer; text-decoration: underline; }
.comment-del-icon { color: #ff6b6b; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<nav class="navbar"><div class="logo">⚽ <span>FIFABOY</span></div><div class="menu"><a href="index.html">Home</a><a href="index.html#feed">Feed</a><a href="profile.html">Profile</a></div></nav>

<div class="details-container">
    <div id="postDetails"><div style="text-align:center; padding:40px;">Loading post...</div></div>
    <div class="comment-section">
        <h3>💬 Comments</h3>
        <div class="comment-input-box">
            <input type="text" id="commentText" placeholder="Write a comment...">
            <button class="btn-comment" onclick="submitComment()">Post</button>
        </div>
        <div id="commentsContainer" class="comments-list"></div>
    </div>
</div>
<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";
const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentPostId = null;
let currentUserId = null;

async function loadPostDetails() {
    const params = new URLSearchParams(window.location.search);
    currentPostId = params.get('id');
    if (!currentPostId) return;
    const { data: { user } } = await mySupabase.auth.getUser();
    currentUserId = user ? user.id : null;
    const { data: post } = await mySupabase.from('posts').select('*').eq('id', currentPostId).maybeSingle();
    if (!post) { document.getElementById("postDetails").innerHTML = "Post not found."; return; }
    renderPostData(post);
    loadComments();
}

function getMediaEmbedHTML(url) {
    if (!url) return "";
    let checkUrl = url.toLowerCase();
    if (checkUrl.includes("youtube.com") || checkUrl.includes("youtu.be")) {
        let id = url.includes("shorts/") ? url.split("shorts/")[1].split("?")[0] : (url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1].split("?")[0]);
        return `<div class="embed-container"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
    }
    if (checkUrl.includes("facebook.com") || checkUrl.includes("fb.watch")) {
        let clean = url.split("?")[0];
        return `<div class="embed-container"><iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(clean)}&show_text=false&width=500" width="100%" height="500" style="border:none;" scrolling="no" frameborder="0" allowfullscreen="true"></iframe></div>`;
    }
    if (checkUrl.includes("tiktok.com")) {
        let clean = url.split("?")[0].replace("tiktok.com", "tiktok.com/embed/v");
        return `<div class="embed-container"><iframe src="${clean}" width="100%" height="550" frameborder="0" allowfullscreen></iframe></div>`;
    }
    if (checkUrl.includes("twitter.com") || checkUrl.includes("x.com")) {
        return `<div class="embed-container"><blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote></div>`;
    }
    if (checkUrl.includes("instagram.com")) {
        let clean = url.split("?")[0]; if (!clean.endsWith("/")) clean += "/";
        return `<div class="embed-container"><iframe src="${clean}embed" style="min-height:450px;"></iframe></div>`;
    }
    return `<img src="${url}" style="max-width:100%; border-radius:8px;">`;
}

async function renderPostData(post) {
    const container = document.getElementById("postDetails");
    const { data: profile } = await mySupabase.from('profiles').select('role').eq('id', currentUserId).maybeSingle();
    const isAdmin = profile && profile.role === 'admin';
    const isPostOwner = currentUserId && (post.user_id === currentUserId);
    
    let actionButtonsHTML = (isPostOwner || isAdmin) ? `
        <div class="author-actions">
            <button class="btn-action btn-edit" onclick="editPost()">✏️ Edit Post</button>
            <button class="btn-action btn-delete" onclick="deletePost()">🗑️ Delete Post</button>
        </div>` : "";

    container.innerHTML = `
        <h2 class="post-title" id="displayTitle">${post.title}</h2>
        <div style="font-size:12px; color:#aaa; margin-bottom:10px;">Posted By: <span class="comment-user">👤 User_${post.user_id ? post.user_id.substring(0,5) : "Unknown"}</span></div>
        <p class="post-desc" id="displayDesc">${post.description}</p>
        ${getMediaEmbedHTML(post.url)}
        ${actionButtonsHTML}
    `;
    if(window.twttr) window.twttr.widgets.load();
}

async function loadComments() {
    const { data: comments } = await mySupabase.from('comments').select('*').eq('post_id', currentPostId).order('created_at', { ascending: true });
    const container = document.getElementById("commentsContainer");
    container.innerHTML = "";
    if (comments) comments.forEach(c => {
        container.innerHTML += `<div class="comment-card"><div><div class="comment-user">👤 User_${c.user_id.substring(0,5)}</div><p>${c.comment || c.comment_text || ""}</p></div>${c.user_id === currentUserId ? `<span class="comment-del-icon" onclick="deleteComment(${c.id})">❌</span>` : ""}</div>`;
    });
}

async function submitComment() {
    const text = document.getElementById("commentText").value;
    if (!text || !currentUserId) return;
    await mySupabase.from('comments').insert([{ post_id: currentPostId, user_id: currentUserId, comment: text }]);
    document.getElementById("commentText").value = "";
    loadComments();
}

async function deleteComment(id) { await mySupabase.from('comments').delete().eq('id', id); loadComments(); }
async function deletePost() { await mySupabase.from('posts').delete().eq('id', currentPostId); window.location.href="index.html"; }
async function editPost() {
    const newTitle = prompt("নতুন টাইটেল:", document.getElementById("displayTitle").innerText);
    const newDesc = prompt("নতুন ডেসক্রিপশন:", document.getElementById("displayDesc").innerText);
    if(newTitle && newDesc) { await mySupabase.from('posts').update({title: newTitle, description: newDesc}).eq('id', currentPostId); window.location.reload(); }
}

window.onload = loadPostDetails;
</script>
</body>
</html>
