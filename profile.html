<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRACKBOY | Profile</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body { background-color: #121212; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
    .profile-card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto 25px; }
    .profile-info { margin-bottom: 15px; font-size: 16px; }
    .profile-info span { color: #3ecf8e; font-weight: 600; }
    
    .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; font-family: inherit; }
    .btn-outline { background: transparent; color: #3ecf8e; border: 2px solid #3ecf8e !important; }
    .btn-solid { background: #3ecf8e; color: white; }
    .btn-danger { background: #ff4a4a; color: white; display: none; margin-bottom: 15px; }

    .section-title { font-size: 20px; color: #3ecf8e; font-weight: bold; margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
    
    /* Post List with Selection */
    .post-list { max-width: 500px; margin: 0 auto; }
    .post-item { 
        background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 12px; 
        display: flex; align-items: center; gap: 15px; border: 1px solid #2d2d2d;
    }
    .post-checkbox { width: 20px; height: 20px; accent-color: #3ecf8e; cursor: pointer; }
    .post-details { flex-grow: 1; }
    .post-title { font-weight: 600; font-size: 16px; margin: 0; color: #fff; }
    .post-meta { font-size: 12px; color: #888; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
    .badge { background: #2d2d2d; color: #3ecf8e; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: auto; }
</style>
</head>
<body>

<div class="profile-card">
    <h2 id="userName" style="margin-top:0;">Loading...</h2>
    <p id="userEmail" style="color:#aaa; margin-bottom:20px;">Loading...</p>
    
    <div class="profile-info">Role: <span id="userRole">user</span></div>
    <div class="profile-info">Account Created: <span id="accountDate">-</span></div>
    
    <button class="btn btn-outline">Edit Profile</button>
    <button class="btn btn-solid" onclick="window.location.href='index.html'">Back to Home</button>
</div>

<div class="post-list">
    <div class="section-title">
        <span>📝 My Evidence Posts</span>
    </div>
    
    <button id="deleteSelectedBtn" class="btn btn-danger" onclick="deleteSelectedPosts()">🗑️ Delete Selected Posts (<span id="selectedCount">0</span>)</button>
    
    <div id="myPostsContainer">
        <p style="text-align:center; color:#888;">Loading your posts...</p>
    </div>
</div>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUserId = null;
let selectedPostIds = [];

// ১. পেজ ইনিশিয়াল ও ইউজার ডাটা লোড
async function initProfile() {
    try {
        const { data: { user } } = await mySupabase.auth.getUser();
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        
        currentUserId = user.id;
        
        // ইউজার ইনফো বসানো
        document.getElementById("userEmail").innerText = user.email;
        document.getElementById("userName").innerText = user.user_metadata.full_name || user.email.split('@')[0];
        
        // অ্যাকাউন্ট তৈরির ডেট ফরম্যাট করা
        if (user.created_at) {
            const date = new Date(user.created_at);
            document.getElementById("accountDate").innerText = date.toLocaleDateString('en-GB');
        }

        // প্রোফাইল রোল চেক
        const { data: pData } = await mySupabase.from('profiles').select('role').eq('id', user.id).maybeSingle();
        if (pData && pData.role) {
            document.getElementById("userRole").innerText = pData.role;
        }
        
        // ইউজারের নিজস্ব পোস্টগুলো লোড করা
        loadUserPosts();
        
    } catch (e) { console.error(e); }
}

// ২. ইউজারের পোস্টগুলো চেকবক্সসহ লিস্ট আকারে আনা
async function loadUserPosts() {
    const container = document.getElementById("myPostsContainer");
    try {
        const { data: posts, error } = await mySupabase
            .from('posts')
            .select('*')
            .eq('user_id', currentUserId)
            .order('created_at', { ascending: false });
            
        if (error) throw error;
        
        if (!posts || posts.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">You haven\'t posted any evidence yet.</p>';
            return;
        }
        
        container.innerHTML = "";
        selectedPostIds = [];
        updateDeleteButtonState();

        posts.forEach(post => {
            const item = document.createElement("div");
            item.className = "post-item";
            
            const rawDate = post.created_at ? new Date(post.created_at).toLocaleDateString('en-GB') : '-';
            const platform = post.platform || "Penalty";

            item.innerHTML = `
                <input type="checkbox" class="post-checkbox" value="${post.id}" onchange="togglePostSelection(this)">
                <div class="post-details">
                    <p class="post-title">${post.title || 'Untitled'}</p>
                    <div class="post-meta">
                        📅 <span>${rawDate}</span>
                    </div>
                </div>
                <span class="badge">${platform}</span>
            `;
            container.appendChild(item);
        });
        
    } catch (e) {
        container.innerHTML = `<p style="text-align:center; color:#ff4a4a;">Error: ${e.message}</p>`;
    }
}

// ৩. চেকবক্স সিলেক্ট/আনসিলেক্ট হ্যান্ডেল করা
function togglePostSelection(checkbox) {
    const postId = parseInt(checkbox.value);
    if (checkbox.checked) {
        if (!selectedPostIds.includes(postId)) selectedPostIds.push(postId);
    } else {
        selectedPostIds = selectedPostIds.filter(id => id !== postId);
    }
    updateDeleteButtonState();
}

// ৪. ডিলিট বাটনের আপডেট ও সংখ্যা দেখানো
function updateDeleteButtonState() {
    const btn = document.getElementById("deleteSelectedBtn");
    const countSpan = document.getElementById("selectedCount");
    
    countSpan.innerText = selectedPostIds.length;
    
    if (selectedPostIds.length > 0) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
}

// ৫. সিলেক্ট করা সব পোস্ট এক ক্লিকে সুপাবেস থেকে ডিলিট করা
async function deleteSelectedPosts() {
    if (selectedPostIds.length === 0) return;
    
    const confirmDelete = confirm(`আপনি কি নিশ্চিতভাবে এই ${selectedPostIds.length}টি পোস্ট ডিলিট করতে চান ভাই?`);
    if (!confirmDelete) return;
    
    const btn = document.getElementById("deleteSelectedBtn");
    try {
        btn.innerText = "Deleting...";
        btn.disabled = true;
        
        // সুapabase এ একসাথে সব সিলেক্টেড আইডি ডিলিট করার ইন-কুয়েরি (in_)
        const { error } = await mySupabase
            .from('posts')
            .delete()
            .in('id', selectedPostIds);
            
        if (error) throw error;
        
        alert("পোস্টগুলো সফলভাবে ডিলিট হয়েছে ভাই!");
        loadUserPosts(); // লিস্ট রিফ্রেশ করা
        
    } catch (e) {
        alert("ডিলিট করতে সমস্যা হয়েছে: " + e.message);
    } finally {
        btn.innerText = "🗑️ Delete Selected Posts";
        btn.disabled = false;
    }
}

window.addEventListener("DOMContentLoaded", initProfile);
</script>
</body>
</html>
