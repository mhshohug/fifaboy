<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRACKBOY | Members List</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    html, body { 
        background-color: #121212 !important; 
        color: white !important; 
        font-family: 'Poppins', sans-serif !important; 
        margin: 0 !important; 
        padding: 20px !important; 
        overflow-y: auto !important;
        height: auto !important;
        min-height: 100vh !important;
    }
    .container {
        max-width: 600px !important;
        margin: 0 auto 30px !important;
    }
    .list-title {
        font-size: 22px !important;
        color: #3ecf8e !important;
        font-weight: 700 !important;
        margin-bottom: 20px !important;
        text-align: center !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
    }
    .user-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 15px !important;
    }
    .member-card {
        background: #1e1e1e !important;
        padding: 15px !important;
        border-radius: 12px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        gap: 15px !important;
        border: 1px solid #2d2d2d !important;
        cursor: pointer !important;
        transition: transform 0.2s, border-color 0.2s !important;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3) !important;
    }
    .member-card:hover {
        transform: translateY(-2px) !important;
        border-color: #3ecf8e !important;
    }
    .member-info {
        display: flex !important;
        align-items: center !important;
        gap: 15px !important;
        flex-grow: 1 !important;
    }
    .member-avatar {
        width: 50px !important;
        height: 50px !important;
        border-radius: 50% !important;
        border: 2px solid #3ecf8e !important;
        object-fit: cover !important;
        background: #2b2b2b !important;
        flex-shrink: 0 !important;
    }
    .member-details {
        text-align: left !important;
    }
    .member-name {
        margin: 0 !important;
        font-size: 16px !important;
        color: #fff !important;
        font-weight: 600 !important;
    }
    .member-meta {
        font-size: 11px !important;
        color: #aaa !important;
        margin-top: 4px !important;
    }
    .role-badge {
        color: #3ecf8e !important;
        font-weight: 600 !important;
    }
    .btn-view {
        background: #3ecf8e !important;
        color: #000 !important;
        border: none !important;
        padding: 8px 14px !important;
        border-radius: 6px !important;
        font-weight: bold !important;
        font-size: 12px !important;
        cursor: pointer !important;
        flex-shrink: 0 !important;
        font-family: inherit !important;
    }
    .loading-status {
        text-align: center !important;
        color: #888 !important;
        padding: 30px !important;
        font-size: 15px !important;
    }
</style>
</head>
<body>

<!-- নেভিগেশন বার আপনার থিম অনুযায়ী -->
<nav class="navbar" style="margin-bottom: 25px;">
<div class="logo">⚽ <span>FIFABOY</span></div>
<div class="menu">
<a href="index.html">Home</a>
<a href="profile.html">My Profile</a>
</div>
</nav>

<div class="container">
    <h2 class="list-title">👥 Registered Members</h2>
    
    <div id="loadingZone" class="loading-status">Loading all profiles from Supabase...</div>
    
    <div id="userGrid" class="user-grid" style="display: none;">
        <!-- ডাটাবেজ থেকে কার্ডগুলো জাভাস্ক্রিপ্ট দিয়ে এখানে লোড হবে -->
    </div>
</div>

<script>
// আপনার প্রজেক্টের সুপাবেস ক্রেডেনশিয়ালস
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadAllProfiles() {
    const loadingZone = document.getElementById("loadingZone");
    const userGrid = document.getElementById("userGrid");
    
    try {
        // ১. সুপাবেসের profiles টেবিল থেকে সব ইউজার ডাটা তুলে আনা (নতুন অ্যাকাউন্ট আগে দেখাবে)
        const { data: profiles, error } = await mySupabase
            .from('profiles')
            .select('id, username, avatar, role, created_at')
            .order('created_at', { ascending: false });
            
        if (error) throw error;
        
        if (!profiles || profiles.length === 0) {
            loadingZone.innerText = "No registered members found.";
            return;
        }
        
        loadingZone.style.display = "none";
        userGrid.innerHTML = "";
        userGrid.style.display = "flex";
        
        // ২. লুপ ঘুরিয়ে প্রত্যেকটা ইউজারের জন্য ডাইনামিক কার্ড তৈরি করা
        profiles.forEach(user => {
            const memberCard = document.createElement("div");
            memberCard.className = "member-card";
            
            // ছবি না থাকলে অটো ডাইনামিক dicebear অবতার সেট হবে
            const avatarUrl = user.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${user.username || 'user'}`;
            const displayId = user.id ? user.id.substring(0, 8) + '...' : 'Unknown';
            
            // অ্যাকাউন্ট তৈরির ডেট ফরম্যাট
            const joinDate = user.created_at ? new Date(user.created_at).toLocaleDateString('en-GB') : '-';
            
            memberCard.setAttribute("onclick", `window.location.href='profile.html?uid=${user.id}'`);
            
            memberCard.innerHTML = `
                <div class="member-info">
                    <img src="${avatarUrl}" class="member-avatar" alt="Avatar">
                    <div class="member-details">
                        <h3 class="member-name">${user.username || 'Unknown User'}</h3>
                        <div class="member-meta">
                            ID: <span>${displayId}</span> | 
                            Role: <span class="role-badge">${user.role || 'user'}</span> | 
                            Joined: <span>${joinDate}</span>
                        </div>
                    </div>
                </div>
                <button class="btn-view">View Profile</button>
            `;
            
            userGrid.appendChild(memberCard);
        });
        
    } catch(e) {
        console.error(e);
        loadingZone.innerHTML = `<span style="color:#ff4a4a;">Failed to load profiles: ${e.message}</span>`;
    }
}

// পেজ ডম রেডি হলে ডাটা কল হবে
window.addEventListener("DOMContentLoaded", loadAllProfiles);
</script>
</body>
</html>
