<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FIFABOY</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: #2a2a2a; padding: 30px; border-radius: 8px; width: 90%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; background: #333; border: 1px solid #444; border-radius: 4px; color: white; }
        button { width: 100%; background: #3ecf8e; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>⚽ Create Account</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="regBtn">Create Account</button>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

    const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const submitBtn = document.getElementById("regBtn");

    submitBtn.addEventListener('click', async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const username = document.getElementById("username").value.trim();

        if(!email || !password) {
            alert("ইমেইল এবং পাসওয়ার্ড দিন!");
            return;
        }

        try {
            submitBtn.innerText = "Processing...";
            const { data, error } = await mySupabase.auth.signUp({
                email: email,
                password: password,
                options: { data: { username: username || email.split('@')[0] } }
            });

            if (error) throw error;
            if (data.user) {
                alert("সফল হয়েছে!");
                window.location.href = "login.html";
            }
        } catch (e) {
            alert("ভুল: " + e.message);
        } finally {
            submitBtn.innerText = "Create Account";
        }
    });
});
</script>
</body>
</html>
