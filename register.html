<!-- আপনার register.html এর ফর্মের ইনপুট আইডিগুলো জাস্ট নিচের মতো মিলিয়ে নিন -->
<script>
async function registerUser() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const username = document.getElementById("username").value; // যদি ইউজারনেম ফিল্ড থাকে
    
    const submitBtn = document.getElementById("registerLink") || document.querySelector("button");
    const originalText = submitBtn.innerText;
    
    if(!email || !password) {
        alert("দয়া করে ইমেইল এবং পাসওয়ার্ড দুটিই দিন!");
        return;
    }

    try {
        submitBtn.innerText = "Creating Account...";
        submitBtn.disabled = true;

        // Supabase-এ সাইন আপ রিকোয়েস্ট
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    username: username || email.split('@')[0] // ইউজারনেম না থাকলে ইমেইলের প্রথম অংশ নেবে
                }
            }
        });

        if (error) throw error;

        if (data.user) {
            alert("রেজিস্ট্রেশন সফল হয়েছে! এবার লগইন করুন।");
            window.location.href = "login.html"; // সরাসরি লগইন পেজে নিয়ে যাবে
        }

    } catch (e) {
        console.error(e);
        alert("ঝামেলা হয়েছে: " + e.message); // আটকে না থেকে এরর দেখাবে
    } finally {
        submitBtn.innerText = originalText;
        submitBtn.disabled = false;
    }
}

// আপনার রেজিস্ট্রেশন বাটনের onclick="registerUser()" সেট করে দিন
</script>
