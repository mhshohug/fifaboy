<footer>

<script>
// ১. সুপাবেস কানেকশন ইনিশিয়াল করা
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjA5OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let POSTS = [];
let isLoggedIn = false;

// স্মার্ট মিডিয়া লিংক ডিটেক্টর ও এমবেড জেনারেটর
function getMediaEmbedHTML(url) {
    if (!url) return "";
    
    // ①. YouTube ভিডিও অথবা Shorts ডিটেকশন
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
        let videoId = "";
        if (url.includes("shorts/")) {
            videoId = url.split("shorts/")[1].split("?")[0];
        } else if (url.includes("v=")) {
            videoId = url.split("v=")[1].split("&")[0];
        } else if (url.includes("youtu.be/")) {
            videoId = url.split("youtu.be/")[1].split("?")[0];
        }
        return `<div class="embed-container"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>`;
    }

    // ②. Facebook ভিডিও অথবা পোস্ট ডিটেকশন
    if (url.includes("facebook.com") || url.includes("fb.watch")) {
        return `<div class="embed-container"><div class="fb-video" data-href="${url}" data-width="500" data-show-text="false"></div></div>`;
    }

    // ③. TikTok ভিডিও ডিটেকশন
    if (url.includes("tiktok.com")) {
        let videoId = url.split("/video/")[1]?.split("?")[0];
        if (videoId) {
            return `<div class="embed-container"><iframe src="https://www.tiktok.com/embed/v2/${videoId}" style="width:100%; height:500px;"></iframe></div>`;
        }
        return `<div class="embed-container"><blockquote class="tiktok-embed" style="max-width: 605px;min-width: 325px;" ><section><a target="_blank" href="${url}">Watch TikTok Video</a></section></blockquote></div>`;
    }

    // ④. Twitter/X পোস্ট ডিটেকশন
    if (url.includes("twitter.com") || url.includes("x.com")) {
        return `<div class="embed-container" style="background:transparent;"><blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote></div>`;
    }

    // ⑤. Instagram পোস্ট বা রিল ডিটেকশন
    if (url.includes("instagram.com")) {
        let cleanUrl = url.split("?")[0] + "embed";
        return `<div class="embed-container"><iframe src="${cleanUrl}" style="min-height:450px;"></iframe></div>`;
    }

    // ⑥. সাধারণ ডাইরেক্ট ইমেজ (jpg, png, gif) হলে
    return `<img src="${url}" alt="Evidence" style="max-width:100%; border-radius:8px; margin-top:10px; display:block;">`;
}

// ইউজার স্টেট চেক
async function initPage(){
    try {
        const { data: { user }, error: userError } = await mySupabase.auth.getUser();
        const login = document.getElementById("loginLink");
        const register = document.getElementById("registerLink");
        const profile = document.getElementById("profileLink");
        const admin = document.getElementById("adminLink");
        const logoutBtn = document.getElementById("logoutLink");

        if(user){
            isLoggedIn = true;
            if(login) login.style.display = "none";
            if(register) register.style.display = "none";
            if(profile) profile.style.display = "inline-block";
            if(logoutBtn) logoutBtn.style.display = "inline-block";

            const { data: profileData } = await mySupabase.from('profiles').select('role').eq('id', user.id).single();
            if(profileData && profileData.role === 'admin' && admin){
                admin.style.display = "inline-block";
            }
        } else {
            isLoggedIn = false;
            if(login) login.style.display = "inline-block";
            if(register) register.style.display = "inline-block";
            if(profile) profile.style.display = "none";
            if(admin) admin.style.display = "none";
            if(logoutBtn) logoutBtn.style.display = "none";
        }
    } catch(e) { console.error(e); }
}

// Supabase থেকে সব পোস্ট রিড করা
async function loadPosts() {
    const feedSection = document.getElementById("feed");
    try {
        const { data, error } = await mySupabase.from('posts').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        POSTS = data || [];
        renderPosts(POSTS);
    } catch (e) {
        if(feedSection) feedSection.innerHTML = `<div class="error" style="color:#ff6b6b; text-align:center; padding:20px;">Failed to load posts: ${e.message}</div>`;
    }
}

// ফিডে পোস্ট রেন্ডার করা
function renderPosts(postsList) {
    const feedSection = document.getElementById("feed");
    if (!feedSection) return;
    if (!postsList || postsList.length === 0) {
        feedSection.innerHTML = `<div class="no-posts" style="text-align:center; padding:20px; color:#aaa;">No evidence found. Be the first to upload!</div>`;
        return;
    }
    feedSection.innerHTML = "";
    postsList.forEach(post => {
        const postCard = document.createElement("div");
        postCard.className = "post-card";
        
        let mediaHTML = getMediaEmbedHTML(post.url);

        postCard.innerHTML = `
            <div class="post-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:#3ecf8e;">${post.title || "Untitled Discussion"}</h3>
                <span class="badge" style="background:#444; font-size:12px; padding:2px 8px; border-radius:4px;">${post.platform || "Community"}</span>
            </div>
            <p class="post-desc" style="color:#ccc; margin-top:10px; line-height:1.5;">${post.description || ""}</p>
            ${mediaHTML}
            <div class="post-footer" style="margin-top:12px; font-size:11px; color:#666;">
                <small>Posted on: ${new Date(post.created_at).toLocaleDateString()}</small>
            </div>
        `;
        feedSection.appendChild(postCard);
    });

    // সোশ্যাল মিডিয়া উইজেট রিলোড করা (যাতে লাইভ স্ক্রিপ্ট লোড হয়)
    if(window.twttr && window.twttr.widgets) window.twttr.widgets.load();
    if(window.FB) window.FB.XFBML.parse();
}

// সরাসরি আপনার তৈরি করা upload.html পেজে নিয়ে যাবে
function openUpload() {
    if (!isLoggedIn) {
        alert("পোস্ট আপলোড করতে প্রথমে লগইন করুন!");
        window.location.href = "login.html";
        return;
    }
    window.location.href = "upload.html";
}

async function logout() {
    await mySupabase.auth.signOut();
    alert("Logged out successfully!");
    window.location.reload();
}

function scrollTopPage() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

window.addEventListener("scroll", () => {
    const top = document.getElementById("topBtn");
    if(top) top.style.display = window.scrollY > 250 ? "flex" : "none";
});

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    const filtered = POSTS.filter(post =>
        (post.title || "").toLowerCase().includes(q) ||
        (post.description || "").toLowerCase().includes(q) ||
        (post.platform || "").toLowerCase().includes(q)
    );
    renderPosts(filtered);
});

window.addEventListener("DOMContentLoaded", () => {
    initPage();
    loadPosts();
});
</script>
</body>
