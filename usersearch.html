<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TRACKBOY | Find Members</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    html, body { 
        background-color: #121212 !important; 
        color: white !important; 
        font-family: 'Poppins', sans-serif !important; 
        margin: 0 !important; 
        padding: 20px !important; 
        overflow-y: auto !important;
        height: auto !important;
        min-height: 100vh !important;
    }
    .container {
        max-width: 600px !important;
        margin: 0 auto 30px !important;
    }
    .search-title {
        font-size: 24px !important;
        color: #3ecf8e !important;
        font-weight: 700 !important;
        margin-bottom: 8px !important;
        text-align: center !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
    }
    .search-subtitle {
        text-align: center !important;
        color: #888 !important;
        font-size: 13px !important;
        margin-bottom: 25px !important;
    }
    .search-wrapper {
        margin-bottom: 25px !important;
        position: relative !important;
        width: 100% !important;
    }
    .global-user-input {
        width: 100% !important;
        padding: 14px 18px !important;
        background: #1e1e1e !important;
        border: 2px solid #2d2d2d !important;
        border-radius: 10px !important;
        color: white !important;
        font-size: 16px !important;
        outline: none !important;
        font-family: inherit !important;
        box-sizing: border-box !important;
        transition: border-color 0.2s, box-shadow 0.2s !important;
    }
    .global-user-input:focus {
        border-color: #3ecf8e !important;
        box-shadow: 0 0 10px rgba(62, 207, 142, 0.2) !important;
    }
    .results-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 15px !important;
    }
    .profile-search-card {
        background: #1e1e1e !important;
        padding: 15px !important;
        border-radius: 12px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        gap: 15px !important;
        border: 1px solid #2d2d2d !important;
        cursor: pointer !important;
        transition: transform 0.2s, border-color 0.2s !important;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3) !important;
    }
    .profile-search-card:hover {
        transform: translateY(-2px) !important;
        border-color: #3ecf8e !important;
    }
    .card-left {
        display: flex !important;
        align-items: center !important;
        gap: 15px !important;
        flex-grow: 1 !important;
    }
    .user-search-avatar {
        width: 52px !important;
        height: 52px !important;
        border-radius: 50% !important;
        border: 2px solid #3ecf8e !important;
        object-fit: cover !important;
        background: #2b2b2b !important;
        flex-shrink: 0 !important;
    }
    .user-search-details {
        text-align: left !important;
    }
    .user-search-name {
        margin: 0 !important;
        font-size: 16px !important;
        color: #fff !important;
        font-weight: 600 !important;
    }
    .user-search-meta {
        font-size: 11px !important;
        color: #aaa !important;
        margin-top: 5px !important;
    }
    .badge-green {
        color: #3ecf8e !important;
        font-weight: 600 !important;
    }
    .btn-profile-go {
        background: #3ecf8e !important;
        color: #000 !important;
        border: none !important;
        padding: 8px 16px !important;
        border-radius: 6px !important;
        font-weight: bold !important;
        font-size: 12px !important;
        cursor: pointer !important;
        flex-shrink: 0 !important;
        font-family: inherit !important;
    }
    .status-msg {
        text-align: center !important;
        color: #666 !important;
        padding: 40px !important;
        font-size: 14px !important;
    }
</style>
</head>
<body>

<nav class="navbar" style="margin-bottom: 25px;">
<div class="logo">⚽ <span>FIFABOY</span></div>
<div class="menu">
<a href="index.html">Home</a>
<a href="profilelist.html">Members</a>
</div>
</nav>

<div class="container">
    <h2 class="search-title">🔍 Find Users</h2>
    <p class="search-subtitle">Search globally across the platform by name or unique ID</p>
    
    <div class="search-wrapper">
        <input type="text" id="globalUserSearch" class="global-user-input" placeholder="Type username or paste ID here..." autofocus>
    </div>
    
    <div id="statusIndicator" class="status-msg">Type something to start searching...</div>
    
    <div id="resultsGrid" class="results-grid">
        </div>
</div>

<script>
const SUPABASE_URL = "https://zqsjopjkhtofyepjneby.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxc2pvcGpraHRvZnllcGpuZWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTQ4MTEsImV4cCI6MjAныাইসবিজিবল209OTIzMDgxMX0.BgUuO9jdDzWNX2tzTw49LQGeaNq59Qv2pbw9CbmkbBU";

// অ্যানন কি-র একটি ক্যাচ ফিক্সড (যদি টোকেনে কোনো ইনজেকশন ক্যারেক্টার থাকে তা রিমুভ করার জন্য ট্রিম করা)
const cleanKey = SUPABASE_ANON_KEY.replace(/[\u200B-\u200D\uFEFF]/g, "").trim();

const mySupabase = window.supabase.createClient(SUPABASE_URL, cleanKey);

let debounceTimer;

document.getElementById("globalUserSearch").addEventListener("input", (e) => {
    const q = e.target.value.trim();
    
    // কিবোর্ড টাইপিং স্পিডের সাথে ডাটাবেজ প্রেশার সামলানোর জন্য ১০০ মিলি-সেকেন্ড ডিবান্স
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        executeGlobalSearch(q);
    }, 150);
});

async function executeGlobalSearch(q) {
    const statusIndicator = document.getElementById("statusIndicator");
    const resultsGrid = document.getElementById("resultsGrid");
    
    if (!q) {
        resultsGrid.innerHTML = "";
        statusIndicator.style.display = "block";
        statusIndicator.innerText = "Type something to start searching...";
        return;
    }
    
    try {
        statusIndicator.style.display = "block";
        statusIndicator.innerText = "🔍 Searching data...";
        resultsGrid.innerHTML = "";

        // সরাসরি সুপাবেস ডাটাবেজের profiles টেবিল থেকে লাইভ কুয়েরি হিট করা
        const { data: users, error } = await mySupabase
            .from('profiles')
            .select('id, username, avatar, role')
            .or(`username.ilike.%${q}%,id.ilike.%${q}%`)
            .limit(20); // পারফরম্যান্স ধরে রাখতে টপ ২০টি রেজাল্ট আনবে
            
        if (error) throw error;
        
        if (!users || users.length === 0) {
            statusIndicator.style.display = "block";
            statusIndicator.innerText = "😕 No users found matching that name or ID.";
            return;
        }
        
        statusIndicator.style.display = "none";
        
        // ম্যাচ হওয়া প্রত্যেক ইউজারের জন্য সুন্দর ডাইনামিক কার্ড জেনারেট করা
        users.forEach(u => {
            const card = document.createElement("div");
            card.className = "profile-search-card";
            
            const avatarUrl = u.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${u.username || 'user'}`;
            const displayId = u.id ? u.id.substring(0, 8) + '...' : 'Unknown';
            
            card.setAttribute("onclick", `window.location.href='profile.html?uid=${u.id}'`);
            
            card.innerHTML = `
                <div class="card-left">
                    <img src="${avatarUrl}" class="user-search-avatar" alt="Avatar">
                    <div class="user-search-details">
                        <h3 class="user-search-name">${u.username || 'Unknown'}</h3>
                        <div class="user-search-meta">
                            ID: <span>${displayId}</span> | 
                            Role: <span class="badge-green">${u.role || 'user'}</span>
                        </div>
                    </div>
                </div>
                <button class="btn-profile-go">View Profile</button>
            `;
            resultsGrid.appendChild(card);
        });
        
    } catch(err) {
        console.error("Global search critical error:", err);
        statusIndicator.style.display = "block";
        statusIndicator.innerHTML = `<span style="color:#ff6b6b;">⚠️ Error fetching search results. Please try again.</span>`;
    }
}
</script>
</body>
</html>
